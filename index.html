<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아르떼조명 상담용 이미지 생성기(C/S CENTER)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    background: #ffffff;
    overflow: auto;
    min-height: 100vh;
  }
  
  /* 상단 파란 라인 */
  .top-line {
    height: 8px;
    background: #4a90e2;
    width: 100%;
    flex-shrink: 0;
  }
  
  .app {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 16px);
    max-width: 1500px;
    margin: 0 auto;
    padding: 0 24px;
    min-width: 320px;
  }
  
  /* 하단 푸터 */
  .app-footer {
    flex-shrink: 0;
    text-align: center;
    padding: 14px 4px;
    color: #1f2937;
    font-size: 13px;
    font-weight: 500;
    background: transparent;
    margin-top: 6px;
    border-top: 4px solid #4a90e2;
    letter-spacing: 1px;
  }
  h1 {
    text-align: center;
    margin: 12px 0 6px 0;
    color: #4a90e2;
    font-size: 18px;
    font-weight: 700;
    flex-shrink: 0;
    letter-spacing: -0.5px;
  }
  .layout {
    display: grid;
    grid-template-columns: 280px 1fr 380px;
    gap: 8px;
    flex: 1;
    min-height: 0;
    min-width: 1200px;
  }
  
  /* 가로 스크롤 시 보이도록 wrapper */
  .layout-wrapper {
    flex: 1;
    overflow-x: auto;
    overflow-y: hidden;
    min-height: 0;
    scrollbar-width: auto;
    scrollbar-color: #4a90e2 #e5e7eb;
  }
  .layout-wrapper::-webkit-scrollbar {
    height: 16px;
    width: 16px;
  }
  .layout-wrapper::-webkit-scrollbar-track {
    background: #e5e7eb;
    border-radius: 8px;
    margin: 0 4px;
  }
  .layout-wrapper::-webkit-scrollbar-thumb {
    background: #4a90e2;
    border-radius: 8px;
    border: 2px solid #e5e7eb;
    min-width: 50px;
  }
  .layout-wrapper::-webkit-scrollbar-thumb:hover {
    background: #2c70c0;
  }
  
  .panel {
    background: white;
    border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    padding: 10px;
    overflow-y: auto;
    overflow-x: hidden;
    min-height: 0;
    scrollbar-width: thin;
  }
  .panel::-webkit-scrollbar {
    width: 8px;
  }
  .panel::-webkit-scrollbar-track {
    background: #f5f5f5;
    border-radius: 4px;
  }
  .panel::-webkit-scrollbar-thumb {
    background: #bbb;
    border-radius: 4px;
  }
  .panel::-webkit-scrollbar-thumb:hover {
    background: #999;
  }
  .panel.center {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 10px;
    min-height: 0;
  }
  .canvas-area {
    flex: 1;
    display: flex;
    gap: 5px;
    min-height: 0;
    width: 100%;
    align-items: stretch;
    overflow: hidden;
  }
  .canvas-wrapper {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
    overflow: hidden;
    border: 1px solid #e0e0e0;
    border-radius: 7px;
    background: #fafafa;
    position: relative;
    transition: all 0.15s;
  }
  .canvas-wrapper.drag-over {
    border: 3px dashed #4a90e2;
    background: #eef6ff;
    box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.2);
  }
  .canvas-wrapper.drag-over::after {
    content: '📷 여기에 이미지를 놓으세요';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(74, 144, 226, 0.95);
    color: white;
    padding: 16px 28px;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 700;
    pointer-events: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    z-index: 100;
    white-space: nowrap;
  }
  canvas {
    display: block;
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    touch-action: none;
  }
  canvas.tool-image { cursor: grab; }
  canvas.tool-image.dragging { cursor: grabbing; }
  canvas.tool-draw { cursor: crosshair; }
  canvas.tool-text { cursor: text; }
  canvas.tool-shape { cursor: crosshair; }
  canvas.tool-erase { cursor: cell; }
  canvas.over-object { cursor: move !important; }
  canvas.moving-object { cursor: grabbing !important; }
  canvas.over-handle-tl { cursor: nwse-resize !important; }
  canvas.over-handle-br { cursor: nwse-resize !important; }
  canvas.over-handle-tr { cursor: nesw-resize !important; }
  canvas.over-handle-bl { cursor: nesw-resize !important; }

  /* 캔버스 위 텍스트 입력 오버레이 */
  .text-overlay {
    position: absolute;
    background: rgba(255, 255, 255, 0.95);
    border: 1px dashed #4a90e2;
    border-radius: 3px;
    padding: 1px 3px;
    font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    color: #000;
    outline: none;
    resize: none;
    overflow: hidden;
    line-height: 1.2;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    z-index: 100;
    min-width: 40px;
    min-height: 16px;
    box-sizing: content-box;
  }
  .action-buttons {
    display: flex;
    gap: 5px;
    margin-top: 8px;
    margin-bottom: 8px;
    flex-shrink: 0;
    flex-grow: 0;
    z-index: 10;
    /* width는 JS에서 캔버스 wrapper + 사이드바 폭으로 동적 설정 */
  }
  .action-buttons .action-btn {
    flex: 1;
  }
  .panel.right {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 10px;
  }
  .section {
    margin-bottom: 7px;
    padding-bottom: 7px;
    border-bottom: 1px solid #eee;
  }
  .section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: #333;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .text-input, .text-area {
    width: 100%;
    padding: 8px 10px;
    border: 2px solid #e0e0e0;
    border-radius: 7px;
    font-size: 13px;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  .text-input:focus, .text-area:focus { outline: none; border-color: #4a90e2; }
  .text-area { resize: vertical; min-height: 80px; }
  .color-presets {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 6px;
  }
  .color-preset {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid #fff;
    box-shadow: 0 0 0 1px #ddd;
    transition: all 0.15s;
    position: relative;
    flex-shrink: 0;
  }
  .color-preset:hover {
    transform: scale(1.25);
    box-shadow: 0 0 0 1px #4a90e2, 0 2px 6px rgba(0,0,0,0.2);
    z-index: 2;
  }
  .color-preset.active {
    box-shadow: 0 0 0 2px #333, 0 0 0 4px #fff, 0 0 0 5px #333;
    transform: scale(1.1);
    z-index: 3;
  }
  .color-preset[data-label]::after {
    content: attr(data-label);
    position: absolute;
    bottom: -22px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: white;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 10px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
    z-index: 10;
  }
  .color-preset:hover::after { opacity: 1; }
  .color-preset .label { display: none; }
  /* 직접선택 (무지개 원) */
  .custom-color-preset {
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .custom-color-preset input[type="color"] {
    opacity: 0;
    width: 100%;
    height: 100%;
    border: none;
    cursor: pointer;
    padding: 0;
    margin: 0;
  }
  .color-picker-wrapper {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #888;
  }
  input[type="color"] {
    width: 36px;
    height: 26px;
    border: 2px solid #e0e0e0;
    border-radius: 5px;
    cursor: pointer;
    padding: 1px;
  }
  .upload-btn, .action-btn, .tool-btn {
    padding: 7px 12px;
    border: none;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .upload-btn {
    background: #4a90e2;
    color: white;
    width: 100%;
  }
  .upload-btn:hover { background: #357abd; }
  .file-name {
    font-size: 10px;
    color: #888;
    margin-top: 4px;
    word-break: break-all;
  }
  .action-btn { background: #2c2c2c; color: white; flex: 1; padding: 7px 10px; font-size: 12px; }
  .action-btn:hover { background: #000; }
  .action-btn.copy-btn { background: #ffd44a; color: #333; }
  .action-btn.copy-btn:hover { background: #ffc107; }
  .action-btn.copy-msg { background: #6c63ff; color: white; }
  .action-btn.copy-msg:hover { background: #5a52e0; }
  .preview-label {
    font-size: 12px;
    color: #666;
    margin-bottom: 4px;
    flex-shrink: 0;
    font-weight: 600;
  }
  .preview-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
    flex-shrink: 0;
  }
  .preview-header .preview-label { margin: 0; }
  .history-buttons {
    display: flex;
    gap: 5px;
  }
  .history-btn {
    padding: 5px 10px;
    background: #f0f0f0;
    border: 1px solid #ddd;
    border-radius: 5px;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    color: #333;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 3px;
  }
  .history-btn:hover:not(:disabled) {
    background: #4a90e2;
    color: white;
    border-color: #4a90e2;
  }
  .history-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #2c2c2c;
    color: white;
    padding: 14px 28px;
    border-radius: 8px;
    font-size: 14px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 1000;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast.success { background: #4caf50; }
  .toast.error { background: #f44336; }
  #fileInput { display: none; }
  .image-controls { display: none; }
  .image-controls.active { display: block; }
  .slider-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
  }
  .slider-row:last-child { margin-bottom: 0; }
  .slider-row label {
    min-width: 56px;
    font-size: 11px;
    font-weight: 600;
    color: #555;
  }
  .slider-row input[type="range"] {
    flex: 1;
    min-width: 50px;
  }
  .slider-row .value-display {
    min-width: 36px;
    font-size: 11px;
    color: #666;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .help-text {
    font-size: 10px;
    color: #4a90e2;
    margin-top: 6px;
    background: #eef6ff;
    padding: 6px 8px;
    border-radius: 5px;
    line-height: 1.4;
  }
  .fit-buttons {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 4px;
    margin-top: 6px;
  }
  .fit-btn {
    padding: 5px 6px;
    border: 1px solid #ddd;
    background: white;
    border-radius: 5px;
    font-size: 10px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .fit-btn:hover { background: #f0f0f0; border-color: #4a90e2; }
  .fit-btn.reset { background: #fff5f5; border-color: #f5c5c5; color: #c44; }
  .fit-btn.reset:hover { background: #ffeaea; }

  .layout-buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
  }
  .layout-btn {
    padding: 6px 4px;
    background: white;
    border: 2px solid #e0e0e0;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #666;
    transition: all 0.15s;
  }
  .layout-btn:hover { background: #f0f0f0; border-color: #4a90e2; color: #4a90e2; }
  .layout-btn.active {
    background: #4a90e2;
    color: white;
    border-color: #2c70c0;
  }
  .layout-btn.hidden { display: none; }

  .image-thumbs {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .image-thumb {
    width: 50px;
    height: 50px;
    border: 2px solid #e0e0e0;
    border-radius: 5px;
    cursor: pointer;
    overflow: hidden;
    position: relative;
    background: #fafafa;
    transition: all 0.15s;
  }
  .image-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .image-thumb:hover { border-color: #4a90e2; }
  .image-thumb.active {
    border-color: #4a90e2;
    box-shadow: 0 0 0 2px #4a90e2;
  }
  .image-thumb .thumb-num {
    position: absolute;
    top: 1px;
    left: 2px;
    background: rgba(0,0,0,0.6);
    color: white;
    font-size: 9px;
    padding: 1px 4px;
    border-radius: 3px;
    font-weight: 600;
  }
  .image-thumb .thumb-delete {
    position: absolute;
    top: 1px;
    right: 1px;
    background: rgba(220,50,50,0.9);
    color: white;
    border: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    line-height: 1;
  }
  .image-thumb .thumb-delete:hover { background: rgba(255,0,0,1); }

  .tool-buttons {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
  }
  .tool-btn {
    background: #f0f0f0;
    color: #333;
    padding: 8px 4px;
    font-size: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    border: 2px solid transparent;
    cursor: pointer;
    border-radius: 7px;
    transition: all 0.15s;
    font-family: inherit;
    font-weight: 600;
  }
  .tool-btn:hover { background: #e0e0e0; }
  .tool-btn.active {
    background: #4a90e2;
    color: white;
    border-color: #2c70c0;
  }
  .tool-btn .icon { font-size: 18px; }

  /* 캔버스 옆 세로 사이드바 - 인덱스 형식 (좌 아이콘 + 우 텍스트) */
  .canvas-side-bar {
    display: flex;
    flex-direction: column;
    gap: 3px;
    width: 100px;
    flex-shrink: 0;
    align-self: stretch;
    min-height: 0;
    max-height: 100%;
    overflow: hidden;
  }
  .canvas-side-bar > * {
    width: 100% !important;
    flex: 1 1 0 !important;
    min-height: 0 !important;
    height: 0 !important;
  }
  .canvas-side-bar .tool-btn {
    padding: 2px 6px !important;
    font-size: 12px !important;
    border-radius: 5px !important;
    border-width: 1px !important;
    line-height: 1.1 !important;
    gap: 6px !important;
    overflow: hidden !important;
    background: #f0f0f0;
    color: #333;
    display: flex !important;
    flex-direction: row !important;
    align-items: center !important;
    justify-content: flex-start !important;
    cursor: pointer;
    border: 1px solid #ddd;
    font-family: inherit;
    font-weight: 600;
    transition: all 0.15s;
    min-height: 0 !important;
  }
  .canvas-side-bar .tool-btn:hover { background: #e0e0e0; }
  .canvas-side-bar .tool-btn.active {
    background: #4a90e2 !important;
    color: white !important;
    border-color: #2c70c0 !important;
  }
  .canvas-side-bar .tool-btn .icon {
    font-size: 18px !important;
    line-height: 1 !important;
    margin: 0 !important;
    flex-shrink: 0;
  }
  .canvas-side-bar .tool-btn span:not(.icon) {
    font-size: 12px !important;
    line-height: 1 !important;
    white-space: nowrap;
    font-weight: 600;
    text-align: left;
  }
  .side-divider {
    display: none;
  }
  .history-btn-v {
    background: #fff7ed;
    border: 1px solid #fdba74;
    border-radius: 5px;
    padding: 2px 6px !important;
    cursor: pointer;
    font-family: inherit;
    color: #c2410c;
    transition: all 0.15s;
    display: flex !important;
    flex-direction: row !important;
    align-items: center !important;
    justify-content: flex-start !important;
    gap: 6px !important;
    font-weight: 600;
    overflow: hidden !important;
    line-height: 1.1 !important;
    min-height: 0 !important;
  }
  .history-btn-v:hover:not(:disabled) {
    background: #4a90e2;
    color: white;
    border-color: #2c70c0;
  }
  .history-btn-v:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .history-btn-v .hbv-icon {
    font-size: 18px !important;
    line-height: 1 !important;
    flex-shrink: 0;
  }
  .history-btn-v .hbv-label {
    font-size: 12px !important;
    line-height: 1 !important;
    font-weight: 600;
    text-align: left;
  }

  .emoji-tabs {
    display: flex;
    gap: 3px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }
  .emoji-tab {
    padding: 4px 7px;
    background: #f0f0f0;
    border: none;
    border-radius: 5px;
    font-size: 10px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .emoji-tab:hover { background: #e0e0e0; }
  .emoji-tab.active { background: #4a90e2; color: white; }
  .emoji-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 2px;
    max-height: 160px;
    overflow-y: auto;
    padding: 3px;
    background: #fafafa;
    border-radius: 5px;
  }
  .emoji-btn {
    aspect-ratio: 1;
    background: white;
    border: 1px solid #e8e8e8;
    border-radius: 4px;
    cursor: pointer;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    padding: 0;
    line-height: 1;
  }
  .emoji-btn:hover {
    background: #fffbe0;
    border-color: #ffd44a;
    transform: scale(1.1);
  }

  .shape-buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    margin-bottom: 6px;
  }
  .shape-btn {
    aspect-ratio: 1;
    background: white;
    border: 2px solid #e0e0e0;
    border-radius: 5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-size: 14px;
    padding: 0;
  }
  .shape-btn:hover { background: #f0f0f0; border-color: #4a90e2; }
  .shape-btn.active { background: #4a90e2; color: white; border-color: #2c70c0; }
  .shape-btn svg { width: 16px; height: 16px; }

  /* 말풍선 모양 버튼 */
  .bubble-shapes {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    margin-bottom: 6px;
  }
  .bubble-shape-btn {
    aspect-ratio: 1;
    background: white;
    border: 2px solid #e0e0e0;
    border-radius: 5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    color: #666;
    padding: 4px;
  }
  .bubble-shape-btn:hover { background: #f0f0f0; border-color: #4a90e2; color: #4a90e2; }
  .bubble-shape-btn.active { background: #4a90e2; color: white; border-color: #2c70c0; }
  
  .bubble-tails {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px;
  }
  .tail-btn {
    aspect-ratio: 1;
    background: white;
    border: 2px solid #e0e0e0;
    border-radius: 5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    color: #666;
    font-size: 16px;
    font-family: inherit;
  }
  .tail-btn:hover { background: #f0f0f0; border-color: #4a90e2; color: #4a90e2; }
  .tail-btn.active { background: #4a90e2; color: white; border-color: #2c70c0; }

  /* 도장 그리드 */
  .stamp-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .stamp-item {
    background: white;
    border: 2px solid #e0e0e0;
    border-radius: 6px;
    cursor: pointer;
    padding: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 70px;
    transition: all 0.15s;
  }
  .stamp-item:hover { background: #f0f0f0; border-color: #4a90e2; }
  .stamp-item.active {
    background: #eef6ff;
    border-color: #4a90e2;
    box-shadow: 0 0 0 1px #4a90e2;
  }
  
  /* 필터 프리셋 버튼 */
  .preset-btn {
    background: white;
    border: 2px solid #e0e0e0;
    border-radius: 6px;
    padding: 8px 6px;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    color: #1f2937;
    font-weight: 600;
    transition: all 0.15s;
  }
  .preset-btn:hover {
    background: #4a90e2;
    color: white;
    border-color: #2c70c0;
  }

  .message-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .message-textarea {
    flex: 1;
    width: 100%;
    padding: 10px;
    border: 2px solid #e0e0e0;
    border-radius: 7px;
    font-size: 13px;
    font-family: inherit;
    resize: none;
    line-height: 1.5;
    min-height: 80px;
  }
  .message-textarea:focus { outline: none; border-color: #4a90e2; }
  .message-templates {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 7px;
  }
  .template-btn {
    padding: 4px 8px;
    background: #f0f0f0;
    border: 1px solid #ddd;
    border-radius: 12px;
    font-size: 10px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .template-btn:hover { background: #ffd44a; border-color: #ffc107; }

  .objects-list {
    max-height: 100px;
    overflow-y: auto;
    background: #fafafa;
    border-radius: 5px;
    padding: 3px;
    margin-top: 6px;
  }
  .object-item {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 6px;
    background: white;
    border-radius: 3px;
    margin-bottom: 2px;
    font-size: 10px;
    cursor: pointer;
  }
  .object-item:hover { background: #f5f9ff; }
  .object-item.selected { background: #eef6ff; border: 1px solid #4a90e2; }
  .object-item:last-child { margin-bottom: 0; }
  .object-item .obj-icon { font-size: 12px; }
  .object-item .obj-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .object-item .obj-delete {
    background: none;
    border: none;
    color: #c44;
    cursor: pointer;
    font-size: 13px;
    padding: 1px 3px;
  }
  .object-item .obj-delete:hover { background: #ffeaea; border-radius: 3px; }

  .color-row {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-bottom: 6px;
  }
  .color-row label {
    font-size: 11px;
    font-weight: 600;
    color: #555;
    min-width: 50px;
  }

  /* 태블릿/세로형 (1300px 이하) - 한 화면 가로로 안 들어가면 가로 스크롤 또는 세로 배치 */
  @media (max-width: 1300px) and (min-width: 900px) {
    /* 좁아도 가로 3단을 유지하되 가로 스크롤 활성화 */
    body { overflow: auto; }
    .app { height: auto; min-height: calc(100vh - 16px); }
    .layout-wrapper { overflow-x: auto; }
    .layout { min-width: 1200px; }
  }

  /* 모바일/세로형 (900px 이하) - 세로 배치 */
  @media (max-width: 900px) {
    body { overflow: auto; padding: 6px; }
    .app { height: auto; min-height: 100vh; }
    .layout-wrapper { overflow: visible; }
    .layout {
      grid-template-columns: 1fr;
      min-width: 0;
      gap: 8px;
    }
    .panel { 
      overflow-y: visible; 
      max-height: none;
    }
    .panel.left, .panel.right {
      max-height: 400px;
      overflow-y: auto;
    }
    .panel.center { 
      overflow: visible; 
      min-height: 500px;
    }
    .canvas-area { 
      min-height: 380px;
    }
    .canvas-wrapper { 
      min-height: 350px;
    }
    .message-textarea { min-height: 120px; }
    
    /* 사이드바 도구를 가로로 배치 (모바일) */
    .canvas-side-bar {
      flex-direction: row !important;
      flex-wrap: wrap;
      width: 100% !important;
      gap: 4px !important;
      padding: 4px;
      order: 99; /* 캔버스 아래로 */
    }
    .canvas-side-bar .tool-btn,
    .canvas-side-bar .history-btn-v {
      flex: 1 1 18%;
      min-width: 60px;
      padding: 6px 2px !important;
    }
    .side-divider {
      display: none;
    }
    .canvas-area {
      flex-direction: column;
    }
    h1 { font-size: 14px; }
  }

  /* 매우 작은 화면 (480px 이하) - 모든 폰트와 간격 축소 */
  @media (max-width: 480px) {
    body { padding: 4px; }
    .panel { padding: 8px; }
    .panel.left, .panel.right { max-height: 320px; }
    .canvas-side-bar .tool-btn,
    .canvas-side-bar .history-btn-v {
      flex: 1 1 22%;
      min-width: 50px;
    }
  }
</style>
</head>
<body>
<div class="top-line"></div>
<div class="app">
  <h1>아르떼조명 상담용 이미지 생성기 (C/S 센터)</h1>

  <div class="layout-wrapper">
  <div class="layout">
    <!-- 왼쪽: 이미지 + 도형/텍스트 -->
    <div class="panel left">
      <div class="section">

      <div class="section">

          <div class="color-preset active" style="background:#f5e056" data-color="#f5e056" data-label="식탁등"></div>

          <div class="color-preset" style="background:#86c1df" data-color="#86c1df" data-label="실링팬"></div>
          <div class="color-preset" style="background:#daeef9" data-color="#daeef9" data-label="벽지"></div>
          <div class="color-preset" style="background:#d4c5e8" data-color="#d4c5e8" data-label="시계"></div>
          <div class="color-preset" style="background:#d8e8c5" data-color="#d8e8c5" data-label="스위치"></div>
          <div class="color-preset" style="background:#c5dce8" data-color="#c5dce8" data-label="기타1"></div>
          <div class="color-preset" style="background:#f5c5c5" data-color="#f5c5c5" data-label="기타2"></div>
          <div class="color-preset" style="background:#ffffff" data-color="#ffffff" data-label="화이트"></div>
          <div class="color-preset" style="background:#e8e8e8" data-color="#e8e8e8" data-label="라이트그레이"></div>

          <label class="color-preset custom-color-preset" data-label="직접선택" style="background: conic-gradient(from 0deg, red, yellow, lime, cyan, blue, magenta, red);">
            <input type="color" id="customColor" value="#f5e056">

        </div>
      </div>

      <div class="section">
        <div class="section-title">🖼️ 배경 이미지</div>
        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">📷 이미지 업로드 (다중 가능)</button>
        <input type="file" id="fileInput" accept="image/*" multiple>
        <div id="fileName" class="file-name">이미지를 선택해주세요</div>
      </div>

      <div class="section image-controls" id="imageControls">
        <div class="section-title">📐 레이아웃 <span id="layoutCount" style="color:#888;font-weight:400;font-size:10px;margin-left:4px;"></span></div>
        <div class="layout-buttons" id="layoutButtons">
          <button class="layout-btn active" data-layout="single" data-min="1" onclick="setLayout('single')" title="1장">
            <svg viewBox="0 0 20 20" width="22" height="22"><rect x="2" y="2" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          </button>
          <button class="layout-btn" data-layout="horizontal" data-min="2" onclick="setLayout('horizontal')" title="좌우 분할 (2장)">
            <svg viewBox="0 0 20 20" width="22" height="22"><rect x="2" y="2" width="7" height="16" fill="none" stroke="currentColor" stroke-width="2"/><rect x="11" y="2" width="7" height="16" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          </button>
          <button class="layout-btn" data-layout="vertical" data-min="2" onclick="setLayout('vertical')" title="상하 분할 (2장)">
            <svg viewBox="0 0 20 20" width="22" height="22"><rect x="2" y="2" width="16" height="7" fill="none" stroke="currentColor" stroke-width="2"/><rect x="2" y="11" width="16" height="7" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          </button>
          <button class="layout-btn" data-layout="grid3" data-min="3" onclick="setLayout('grid3')" title="1+2 (좌측1+우측2, 3장)">
            <svg viewBox="0 0 20 20" width="22" height="22"><rect x="2" y="2" width="7" height="16" fill="none" stroke="currentColor" stroke-width="2"/><rect x="11" y="2" width="7" height="7" fill="none" stroke="currentColor" stroke-width="2"/><rect x="11" y="11" width="7" height="7" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          </button>
          <button class="layout-btn" data-layout="grid3v" data-min="3" onclick="setLayout('grid3v')" title="2+1 (상측2+하측1, 3장)">
            <svg viewBox="0 0 20 20" width="22" height="22"><rect x="2" y="2" width="7" height="7" fill="none" stroke="currentColor" stroke-width="2"/><rect x="11" y="2" width="7" height="7" fill="none" stroke="currentColor" stroke-width="2"/><rect x="2" y="11" width="16" height="7" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          </button>
          <button class="layout-btn" data-layout="row3" data-min="3" onclick="setLayout('row3')" title="가로 3분할 (3장)">
            <svg viewBox="0 0 20 20" width="22" height="22"><rect x="2" y="2" width="4.5" height="16" fill="none" stroke="currentColor" stroke-width="2"/><rect x="7.75" y="2" width="4.5" height="16" fill="none" stroke="currentColor" stroke-width="2"/><rect x="13.5" y="2" width="4.5" height="16" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          </button>
          <button class="layout-btn" data-layout="grid4" data-min="4" onclick="setLayout('grid4')" title="2×2 (4장)">
            <svg viewBox="0 0 20 20" width="22" height="22"><rect x="2" y="2" width="7" height="7" fill="none" stroke="currentColor" stroke-width="2"/><rect x="11" y="2" width="7" height="7" fill="none" stroke="currentColor" stroke-width="2"/><rect x="2" y="11" width="7" height="7" fill="none" stroke="currentColor" stroke-width="2"/><rect x="11" y="11" width="7" height="7" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          </button>
          <button class="layout-btn" data-layout="row4" data-min="4" onclick="setLayout('row4')" title="가로 4분할 (4장)">
            <svg viewBox="0 0 20 20" width="22" height="22"><rect x="2" y="2" width="3" height="16" fill="none" stroke="currentColor" stroke-width="2"/><rect x="6" y="2" width="3" height="16" fill="none" stroke="currentColor" stroke-width="2"/><rect x="10" y="2" width="3" height="16" fill="none" stroke="currentColor" stroke-width="2"/><rect x="14" y="2" width="3" height="16" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          </button>
          <button class="layout-btn" data-layout="col4" data-min="4" onclick="setLayout('col4')" title="세로 4분할 (4장)">
            <svg viewBox="0 0 20 20" width="22" height="22"><rect x="2" y="2" width="16" height="3" fill="none" stroke="currentColor" stroke-width="2"/><rect x="2" y="6" width="16" height="3" fill="none" stroke="currentColor" stroke-width="2"/><rect x="2" y="10" width="16" height="3" fill="none" stroke="currentColor" stroke-width="2"/><rect x="2" y="14" width="16" height="3" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          </button>
          <button class="layout-btn" data-layout="grid23" data-min="5" onclick="setLayout('grid23')" title="2+3 (5장)">
            <svg viewBox="0 0 20 20" width="22" height="22"><rect x="2" y="2" width="7" height="7" fill="none" stroke="currentColor" stroke-width="2"/><rect x="11" y="2" width="7" height="7" fill="none" stroke="currentColor" stroke-width="2"/><rect x="2" y="11" width="4.5" height="7" fill="none" stroke="currentColor" stroke-width="2"/><rect x="7.75" y="11" width="4.5" height="7" fill="none" stroke="currentColor" stroke-width="2"/><rect x="13.5" y="11" width="4.5" height="7" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          </button>
          <button class="layout-btn" data-layout="grid6" data-min="6" onclick="setLayout('grid6')" title="3×2 (6장)">
            <svg viewBox="0 0 20 20" width="22" height="22"><rect x="2" y="2" width="4.5" height="7" fill="none" stroke="currentColor" stroke-width="2"/><rect x="7.75" y="2" width="4.5" height="7" fill="none" stroke="currentColor" stroke-width="2"/><rect x="13.5" y="2" width="4.5" height="7" fill="none" stroke="currentColor" stroke-width="2"/><rect x="2" y="11" width="4.5" height="7" fill="none" stroke="currentColor" stroke-width="2"/><rect x="7.75" y="11" width="4.5" height="7" fill="none" stroke="currentColor" stroke-width="2"/><rect x="13.5" y="11" width="4.5" height="7" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          </button>
        </div>
        
        <div id="imageSelector" style="margin-top:8px; display:none;">
          <div style="font-size:11px; color:#555; font-weight:600; margin-bottom:4px;">조절할 이미지 선택</div>
          <div id="imageThumbs" class="image-thumbs"></div>
        </div>
        
        <div class="section-title" style="margin-top:10px;">⚙️ 이미지 조절</div>
        <div class="slider-row">
          <label>🔍 확대/축소</label>
          <input type="range" id="zoomSlider" min="10" max="500" value="100" step="1">
          <span class="value-display" id="zoomValue">100%</span>
        </div>
        <div class="slider-row">
          <label>↔️ 가로</label>
          <input type="range" id="offsetXSlider" min="-100" max="100" value="0" step="1">
          <span class="value-display" id="offsetXValue">0</span>
        </div>
        <div class="slider-row">
          <label>↕️ 세로</label>
          <input type="range" id="offsetYSlider" min="-100" max="100" value="0" step="1">
          <span class="value-display" id="offsetYValue">0</span>
        </div>
        <div class="fit-buttons">
          <button class="fit-btn" onclick="fitImage('cover')">꽉 채우기</button>
          <button class="fit-btn" onclick="fitImage('contain')">전체 보이기</button>
          <button class="fit-btn" onclick="fitImage('100')">100% 원본</button>
          <button class="fit-btn reset" onclick="resetImageTransform()">↺ 초기화</button>

      <div class="section">
        <div class="section-title">📋 추가된 객체</div>
        <div id="objectsList" class="objects-list">

        </div>
      </div>

    <!-- 가운데: 미리보기 + 히스토리 + 도구 -->
    <div class="panel center">
      <div class="preview-header">
        <span class="preview-label">미리보기 (저장 사이즈: 1088 × 889px)</span>
      </div>
      <div class="canvas-area">
        <div class="canvas-wrapper">
          <canvas id="canvas" width="1088" height="889" class="tool-image"></canvas>
          <textarea id="textOverlay" class="text-overlay" style="display:none;" placeholder="입력"></textarea>
        </div>
        <!-- 우측 세로 버튼: 히스토리 + 도구 -->
        <div class="canvas-side-bar">
          <button class="history-btn-v" id="undoBtn" onclick="undo()" title="실행 취소 (Ctrl+Z)">

            <span class="hbv-label">뒤로</span>

          <button class="history-btn-v" id="redoBtn" onclick="redo()" title="다시 실행 (Ctrl+Y)">

          <button class="tool-btn active" data-tool="image" onclick="setTool('image')">

          <button class="tool-btn" data-tool="erase" onclick="setTool('erase')">

          <button class="tool-btn" data-tool="text" onclick="setTool('text')">
            <span class="icon">📝</span><span>텍스트</span>
          </button>
          <button class="tool-btn" data-tool="emoji" onclick="setTool('emoji')">
            <span class="icon">⭐</span><span>이모티콘</span>
          </button>
          <button class="tool-btn" data-tool="shape" onclick="setTool('shape')">
            <span class="icon">⬜</span><span>도형</span>
          </button>
          <button class="tool-btn" data-tool="bubble" onclick="setTool('bubble')">
            <span class="icon">💬</span><span>말풍선</span>

          <button class="tool-btn" data-tool="mosaic" onclick="setTool('mosaic')">
            <span class="icon">🟫</span><span>모자이크</span>

          <button class="tool-btn" data-tool="filter" onclick="setTool('filter')">

          </button>
          <button class="tool-btn" data-tool="stamp" onclick="setTool('stamp')">
            <span class="icon">🏷️</span><span>로고</span>
          </button>
        </div>
      </div>

      <div class="action-buttons">
        <button class="action-btn" onclick="downloadImage()">💾 PNG 저장</button>
        <button class="action-btn copy-btn" onclick="copyImage()">📋 이미지 복사</button>
      </div>
    </div>

    <!-- 오른쪽: 도구 옵션 + 메시지 -->
    <div class="panel right">
      <!-- 도구별 옵션 패널 -->
      <div class="section" id="toolOptions">
        <div class="section-title" id="toolOptionsTitle">🖼️ 이미지 모드</div>
        <div id="toolOptionsBody">
          <div class="help-text">💡 마우스로 이미지를 드래그하거나 휠로 확대/축소할 수 있습니다.</div>
        </div>
      </div>

      <!-- 메시지 입력 -->
      <div class="section message-panel">
        <div class="section-title">💬 고객 발송 메시지</div>
        <div class="message-templates">
          <button class="template-btn" onclick="insertTemplate('greeting')">인사말</button>
          <button class="template-btn" onclick="insertTemplate('confirm')">확인요청</button>
          <button class="template-btn" onclick="insertTemplate('thanks')">감사인사</button>
          <button class="template-btn" onclick="insertTemplate('clear')">비우기</button>
        </div>
        <textarea id="messageInput" class="message-textarea" placeholder="고객님께 보낼 메시지를 입력해주세요...&#10;&#10;예시)&#10;안녕하세요 고객님,&#10;문의주신 제품의 도면을 보내드립니다.&#10;확인 부탁드립니다 :)"></textarea>
        <button class="action-btn copy-msg" style="margin-top:8px; margin-bottom:8px; flex:none; flex-shrink:0;" onclick="copyMessage()">📋 메시지 복사</button>
      </div>
    </div>
  </div>
  </div>
  <footer class="app-footer">
    아이오틱스-아르떼조명
  </footer>
</div>

<div class="toast" id="toast"></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const titleInput = document.getElementById('titleInput');
const customColor = document.getElementById('customColor');
const fileInput = document.getElementById('fileInput');

// === 히스토리 (Undo/Redo) ===
let history = [];
let historyIndex = -1;
const MAX_HISTORY = 50;

function saveHistory() {
  // 현재 시점 이후의 history 제거 (새 작업 시 redo 무효화)
  history = history.slice(0, historyIndex + 1);
  history.push(JSON.stringify(objects));
  if (history.length > MAX_HISTORY) {
    history.shift();
  } else {
    historyIndex++;
  }
  updateHistoryButtons();
}

function undo() {
  if (historyIndex > 0) {
    historyIndex--;
    objects = JSON.parse(history[historyIndex]);
    selectedObjectId = null;
    updateObjectsList();
    updateHistoryButtons();
    drawCanvas();
  }
}

function redo() {
  if (historyIndex < history.length - 1) {
    historyIndex++;
    objects = JSON.parse(history[historyIndex]);
    selectedObjectId = null;
    updateObjectsList();
    updateHistoryButtons();
    drawCanvas();
  }
}

function updateHistoryButtons() {
  document.getElementById('undoBtn').disabled = historyIndex <= 0;
  document.getElementById('redoBtn').disabled = historyIndex >= history.length - 1;
}

window.undo = undo;
window.redo = redo;

// 키보드 단축키
document.addEventListener('keydown', (e) => {
  // 입력 필드에서는 단축키 무시
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    e.preventDefault();
    undo();
  } else if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) {
    e.preventDefault();
    redo();
  } else if (e.key === 'Delete' || e.key === 'Backspace') {
    if (selectedObjectId !== null) {
      e.preventDefault();
      objects = objects.filter(o => o.id !== selectedObjectId);
      selectedObjectId = null;
      saveHistory();
      updateObjectsList();
      drawCanvas();
    }
  } else if (e.key === 'Escape') {
    if (selectedObjectId !== null) {
      selectedObjectId = null;
      drawCanvas();
    }
  }
});

// === 이미지 업로드 (다중) ===
// 파일 배열을 받아서 이미지로 처리하는 공통 함수
function processImageFiles(files) {
  if (!files || files.length === 0) return;
  
  let loaded = 0;
  const newImages = [];
  
  files.forEach((file, index) => {
    // 이미지 파일만 처리
    if (!file.type.startsWith('image/')) {
      loaded++;
      if (loaded === files.length) finalizeImageLoad();
      return;
    }
    
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        newImages[index] = {
          img: img,
          fileName: file.name,
          state: { zoom: 1.0, offsetX: 0, offsetY: 0, baseScale: 1.0 }
        };
        loaded++;
        
        if (loaded === files.length) finalizeImageLoad();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  
  function finalizeImageLoad() {
    const validImages = newImages.filter(x => x);
    if (validImages.length === 0) return;
    
    // 기존 이미지에 추가
    const startIdx = images.length;
    images = images.concat(validImages);
    
    // 자동 레이아웃 선택 (이미지 개수에 따라)
    layoutMode = getDefaultLayoutFor(images.length);
    
    // 호환성을 위해 currentImage도 설정
    currentImage = images[0].img;
    activeImageIndex = startIdx;
    if (activeImageIndex >= images.length) activeImageIndex = 0;
    
    updateFileNameDisplay();
    updateLayoutButtons();
    imageControls.classList.add('active');
    
    // 모든 이미지에 cover 자동 맞춤
    images.forEach((_, i) => {
      fitImageForIndex(i, 'cover');
    });
    
    // 슬라이더는 활성 이미지 기준
    syncSlidersFromActiveImage();
    updateImageThumbs();
    drawCanvas();
    
    // 이미지 업로드로 패널 내용이 변경되어 레이아웃 재계산 필요
    if (typeof syncCanvasLayout === 'function') {
      syncCanvasLayout();
      setTimeout(syncCanvasLayout, 50);
      setTimeout(syncCanvasLayout, 200);
    }
  }
}

// 페이지 전체에서 기본 동작 막기 (브라우저가 이미지를 새 탭으로 열지 않도록)
['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
  document.addEventListener(evt, (e) => {
    if (e.target.closest('.canvas-wrapper')) {
      e.preventDefault();
      e.stopPropagation();
    }
  });
  // 페이지 전체에서도 기본 막기 (페이지 떠나는 거 방지)
  window.addEventListener(evt, (e) => {
    if (evt === 'dragover' || evt === 'drop') {
      e.preventDefault();
    }
  });
});

if (canvasWrapper) {
  canvasWrapper.addEventListener('dragenter', (e) => {
    e.preventDefault();
    e.stopPropagation();
    canvasWrapper.classList.add('drag-over');
  });
  
  canvasWrapper.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.stopPropagation();
    e.dataTransfer.dropEffect = 'copy';
    canvasWrapper.classList.add('drag-over');
  });
  
  canvasWrapper.addEventListener('dragleave', (e) => {
    e.preventDefault();
    e.stopPropagation();
    // wrapper를 완전히 벗어났을 때만 클래스 제거
    if (!canvasWrapper.contains(e.relatedTarget)) {
      canvasWrapper.classList.remove('drag-over');
    }
  });
  
  canvasWrapper.addEventListener('drop', (e) => {
    e.preventDefault();
    e.stopPropagation();
    canvasWrapper.classList.remove('drag-over');
    
    const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
    if (files.length > 0) {
      processImageFiles(files);
    }
  });
}

// === 레이아웃 시스템 ===
const CELL_GAP = 8;

// 레이아웃에서 i번째 이미지가 들어갈 셀의 사각형 계산
function getCellRect(index) {
  const x = IMAGE_AREA_X, y = IMAGE_AREA_Y, w = IMAGE_AREA_W, h = IMAGE_AREA_H;
  const g = CELL_GAP;
  const layout = effectiveLayout();
  
  if (layout === 'single' || images.length <= 1) {
    return { x, y, w, h };
  }
  if (layout === 'horizontal') {
    const cw = (w - g) / 2;
    if (index === 0) return { x, y, w: cw, h };
    return { x: x + cw + g, y, w: cw, h };
  }
  if (layout === 'vertical') {
    const ch = (h - g) / 2;
    if (index === 0) return { x, y, w, h: ch };
    return { x, y: y + ch + g, w, h: ch };
  }
  if (layout === 'grid3') {
    // 좌측 큰 1장 + 우측 위/아래 2장
    const cw = (w - g) / 2;
    const ch = (h - g) / 2;
    if (index === 0) return { x, y, w: cw, h };
    if (index === 1) return { x: x + cw + g, y, w: cw, h: ch };
    return { x: x + cw + g, y: y + ch + g, w: cw, h: ch };
  }
  if (layout === 'grid3v') {
    // 상단 좌/우 2장 + 하단 큰 1장
    const cw = (w - g) / 2;
    const ch = (h - g) / 2;
    if (index === 0) return { x, y, w: cw, h: ch };
    if (index === 1) return { x: x + cw + g, y, w: cw, h: ch };
    return { x, y: y + ch + g, w, h: ch };
  }
  if (layout === 'row3') {
    // 가로 3분할
    const cw = (w - g * 2) / 3;
    return { x: x + (cw + g) * index, y, w: cw, h };
  }
  if (layout === 'grid4') {
    const cw = (w - g) / 2;
    const ch = (h - g) / 2;
    if (index === 0) return { x, y, w: cw, h: ch };
    if (index === 1) return { x: x + cw + g, y, w: cw, h: ch };
    if (index === 2) return { x, y: y + ch + g, w: cw, h: ch };
    return { x: x + cw + g, y: y + ch + g, w: cw, h: ch };
  }
  if (layout === 'row4') {
    // 가로 4분할
    const cw = (w - g * 3) / 4;
    return { x: x + (cw + g) * index, y, w: cw, h };
  }
  if (layout === 'col4') {
    // 세로 4분할
    const ch = (h - g * 3) / 4;
    return { x, y: y + (ch + g) * index, w, h: ch };
  }
  if (layout === 'grid23') {
    // 상단 2 + 하단 3 (총 5장)
    const ch = (h - g) / 2;
    if (index < 2) {
      const cw = (w - g) / 2;
      return { x: x + (cw + g) * index, y, w: cw, h: ch };
    }
    const cw = (w - g * 2) / 3;
    const i = index - 2;
    return { x: x + (cw + g) * i, y: y + ch + g, w: cw, h: ch };
  }
  if (layout === 'grid6') {
    // 3×2 (총 6장)
    const cw = (w - g * 2) / 3;
    const ch = (h - g) / 2;
    const col = index % 3;
    const row = Math.floor(index / 3);
    return { x: x + (cw + g) * col, y: y + (ch + g) * row, w: cw, h: ch };
  }
  return { x, y, w, h };
}

// 레이아웃별 필요한 최소 이미지 수
const LAYOUT_MIN = {
  single: 1,
  horizontal: 2,
  vertical: 2,
  grid3: 3,
  grid3v: 3,
  row3: 3,
  grid4: 4,
  row4: 4,
  col4: 4,
  grid23: 5,
  grid6: 6
};

function effectiveLayout() {
  if (images.length <= 1) return 'single';
  // 현재 layoutMode가 이미지 개수에 맞지 않으면 자동 보정
  const min = LAYOUT_MIN[layoutMode] || 1;
  if (images.length < min) {
    return getDefaultLayoutFor(images.length);
  }
  return layoutMode;
}

// 이미지 개수에 맞는 기본 레이아웃 추천
function getDefaultLayoutFor(count) {
  if (count <= 1) return 'single';
  if (count === 2) return 'horizontal';
  if (count === 3) return 'grid3';
  if (count === 4) return 'grid4';
  if (count === 5) return 'grid23';
  return 'grid6';
}

function setLayout(mode) {
  layoutMode = mode;
  updateLayoutButtons();
  images.forEach((_, i) => fitImageForIndex(i, 'cover'));
  syncSlidersFromActiveImage();
  drawCanvas();
}

function updateLayoutButtons() {
  // 표시되는 이미지 개수 라벨
  const cntLabel = document.getElementById('layoutCount');
  if (cntLabel) {
    cntLabel.textContent = images.length > 0 ? `(이미지 ${images.length}장)` : '';
  }
  
  // 이미지 개수에 따라 가능한 버튼만 표시
  document.querySelectorAll('.layout-btn').forEach(b => {
    const min = parseInt(b.dataset.min) || 1;
    const max = parseInt(b.dataset.max) || 999;
    if (images.length >= min && images.length <= max) {
      b.classList.remove('hidden');
    } else {
      b.classList.add('hidden');
    }
    b.classList.remove('active');
  });
  
  // 현재 layoutMode가 사용 불가하면 자동으로 적합한 것으로 변경
  const min = LAYOUT_MIN[layoutMode] || 1;
  if (images.length < min) {
    layoutMode = getDefaultLayoutFor(images.length);
  }
  
  const btn = document.querySelector(`.layout-btn[data-layout="${layoutMode}"]`);
  if (btn) btn.classList.add('active');
}

window.setLayout = setLayout;

function updateImageThumbs() {
  const selector = document.getElementById('imageSelector');
  const thumbs = document.getElementById('imageThumbs');
  if (images.length === 0) {
    selector.style.display = 'none';
    return;
  }
  selector.style.display = images.length > 1 ? 'block' : 'none';
  thumbs.innerHTML = images.map((item, i) => `
    <div class="image-thumb ${i === activeImageIndex ? 'active' : ''}" onclick="selectActiveImage(${i})">
      <img src="${item.img.src}" alt="">
      <span class="thumb-num">${i + 1}</span>
      <button class="thumb-delete" onclick="event.stopPropagation();removeImage(${i})" title="삭제">×</button>
    </div>
  `).join('');
}

window.selectActiveImage = function(index) {
  activeImageIndex = index;
  syncSlidersFromActiveImage();
  updateImageThumbs();
  drawCanvas();
};

window.removeImage = function(index) {
  images.splice(index, 1);
  if (images.length === 0) {
    currentImage = null;
    imageControls.classList.remove('active');
    activeImageIndex = 0;
    layoutMode = 'single';
  } else {
    if (activeImageIndex >= images.length) activeImageIndex = images.length - 1;
    currentImage = images[0].img;
    // 현재 layoutMode가 이미지 수에 맞지 않으면 적합한 것으로 변경
    const min = LAYOUT_MIN[layoutMode] || 1;
    if (images.length < min) {
      layoutMode = getDefaultLayoutFor(images.length);
    }
    images.forEach((_, i) => fitImageForIndex(i, 'cover'));
    syncSlidersFromActiveImage();
  }
  updateFileNameDisplay();
  updateLayoutButtons();
  updateImageThumbs();
  drawCanvas();
};

function getActiveImageCell() {
  return getCellRect(activeImageIndex);
}

function syncSlidersFromActiveImage() {
  const st = getActiveImageState();
  zoomSlider.value = Math.round(st.zoom * 100);
  zoomValue.textContent = Math.round(st.zoom * 100) + '%';
  const cell = getActiveImageCell();
  const offX = cell.w > 0 ? Math.round((st.offsetX / cell.w) * 100) : 0;
  const offY = cell.h > 0 ? Math.round((st.offsetY / cell.h) * 100) : 0;
  offsetXSlider.value = Math.max(-100, Math.min(100, offX));
  offsetXValue.textContent = offX;
  offsetYSlider.value = Math.max(-100, Math.min(100, offY));
  offsetYValue.textContent = offY;
}

zoomSlider.addEventListener('input', (e) => {
  const st = getActiveImageState();
  st.zoom = parseInt(e.target.value) / 100;
  zoomValue.textContent = e.target.value + '%';
  drawCanvas();
});

offsetXSlider.addEventListener('input', (e) => {
  const val = parseInt(e.target.value);
  const st = getActiveImageState();
  const cell = getActiveImageCell();
  st.offsetX = (val / 100) * cell.w;
  offsetXValue.textContent = val;
  drawCanvas();
});

offsetYSlider.addEventListener('input', (e) => {
  const val = parseInt(e.target.value);
  const st = getActiveImageState();
  const cell = getActiveImageCell();
  st.offsetY = (val / 100) * cell.h;
  offsetYValue.textContent = val;
  drawCanvas();
});

function fitImage(mode) {
  if (images.length === 0) return;
  fitImageForIndex(activeImageIndex, mode);
  syncSlidersFromActiveImage();
  drawCanvas();
}

function fitImageForIndex(index, mode) {
  if (!images[index]) return;
  const img = images[index].img;
  const st = images[index].state;
  const cell = getCellRect(index);
  const imgRatio = img.width / img.height;
  const areaRatio = cell.w / cell.h;
  if (mode === 'cover') {
    if (imgRatio > areaRatio) st.baseScale = cell.h / img.height;
    else st.baseScale = cell.w / img.width;
  } else if (mode === 'contain') {
    if (imgRatio > areaRatio) st.baseScale = cell.w / img.width;
    else st.baseScale = cell.h / img.height;
  } else if (mode === '100') {
    st.baseScale = 1.0;
  }
  st.zoom = 1.0;
  st.offsetX = 0;
  st.offsetY = 0;
}

function resetImageTransform() {
  fitImage('cover');
}

function updateSliders() {
  syncSlidersFromActiveImage();
}

// 배경 색상 밝기에 따라 글자색 결정 (밝은 배경 -> 검정, 어두운 배경 -> 흰색)
function getContrastColor(hex) {
  hex = hex.replace('#', '');
  if (hex.length === 3) hex = hex.split('').map(c => c+c).join('');
  const r = parseInt(hex.substr(0,2), 16);
  const g = parseInt(hex.substr(2,2), 16);
  const b = parseInt(hex.substr(4,2), 16);
  const brightness = (r * 299 + g * 587 + b * 114) / 1000;
  return brightness > 140 ? '#1a1a1a' : '#ffffff';
}

// === 도구 전환 ===
function setTool(tool) {
  // 텍스트 편집 중이면 먼저 확정
  if (textOverlay && textOverlay.style.display !== 'none') {
    commitTextEdit();
  }
  currentTool = tool;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.tool-btn[data-tool="${tool}"]`).classList.add('active');
  canvas.className = '';
  canvas.classList.add('tool-' + tool);
  if (tool === 'emoji') canvas.classList.add('tool-shape');
  updateToolOptions();
}

// 도장 업로드 처리 - 배경 제거 + 단색화
function handleStampUpload(e) {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = (evt) => {
      const img = new Image();
      img.onload = () => {
        // 캔버스로 그려서 배경 제거 + 단색화 처리
        const tmpCanvas = document.createElement('canvas');
        const w = img.naturalWidth, h = img.naturalHeight;
        tmpCanvas.width = w;
        tmpCanvas.height = h;
        const tctx = tmpCanvas.getContext('2d');
        tctx.drawImage(img, 0, 0);
        const imgData = tctx.getImageData(0, 0, w, h);
        const data = imgData.data;
        
        // 배경 제거 + 단색화 (검정 + 알파)
        for (let i = 0; i < data.length; i += 4) {
          const r = data[i], g = data[i+1], b = data[i+2];
          const brightness = (r + g + b) / 3;
          if (brightness > 240) {
            data[i+3] = 0; // 흰색은 투명
          } else {
            data[i] = 0;
            data[i+1] = 0;
            data[i+2] = 0;
            data[i+3] = Math.max(0, Math.min(255, 255 - brightness));
          }
        }
        tctx.putImageData(imgData, 0, 0);
        
        // 트림 (투명 영역 잘라내기)
        const trimmed = trimCanvas(tmpCanvas);
        
        // 등록
        const stampImg = new Image();
        stampImg.onload = () => {
          stampState.customStamps.push({
            name: file.name.replace(/\.[^.]+$/, '').substring(0, 12),
            dataUrl: trimmed.toDataURL('image/png'),
            img: stampImg,
            w: stampImg.naturalWidth,
            h: stampImg.naturalHeight
          });
          stampState.selected = stampState.customStamps.length - 1;
          updateToolOptions(); // 도구 옵션 다시 그리기
        };
        stampImg.src = trimmed.toDataURL('image/png');
      };
      img.src = evt.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// 캔버스의 투명 영역 트림
function trimCanvas(c) {
  const ctx = c.getContext('2d');
  const w = c.width, h = c.height;
  const data = ctx.getImageData(0, 0, w, h).data;
  let minX = w, minY = h, maxX = 0, maxY = 0;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      if (data[(y*w + x)*4 + 3] > 0) {
        if (x < minX) minX = x;
        if (y < minY) minY = y;
        if (x > maxX) maxX = x;
        if (y > maxY) maxY = y;
      }
    }
  }
  if (minX > maxX) return c;
  const tw = maxX - minX + 1, th = maxY - minY + 1;
  const out = document.createElement('canvas');
  out.width = tw;
  out.height = th;
  out.getContext('2d').drawImage(c, minX, minY, tw, th, 0, 0, tw, th);
  return out;
}

// === 모자이크 관련 ===
// 영역의 픽셀 데이터를 모자이크 처리
function applyMosaicToImageData(imgData, blockSize) {
  const data = imgData.data;
  const w = imgData.width, h = imgData.height;
  for (let by = 0; by < h; by += blockSize) {
    for (let bx = 0; bx < w; bx += blockSize) {
      // 블록 평균 색상 계산
      let r = 0, g = 0, b = 0, count = 0;
      const ex = Math.min(bx + blockSize, w);
      const ey = Math.min(by + blockSize, h);
      for (let y = by; y < ey; y++) {
        for (let x = bx; x < ex; x++) {
          const i = (y * w + x) * 4;
          r += data[i]; g += data[i+1]; b += data[i+2];
          count++;
        }
      }
      r = Math.round(r / count); g = Math.round(g / count); b = Math.round(b / count);
      // 블록 채우기
      for (let y = by; y < ey; y++) {
        for (let x = bx; x < ex; x++) {
          const i = (y * w + x) * 4;
          data[i] = r; data[i+1] = g; data[i+2] = b;
        }
      }
    }
  }
}

// 필터를 활성 이미지에 영구 적용
window.applyFilter = function() {
  if (!images || !images.length) {
    alert('먼저 이미지를 업로드해주세요.');
    return;
  }
  const imgData = images[activeImageIndex];
  if (!imgData || !imgData.img) return;
  
  // 새 캔버스에 필터 적용된 이미지 그리기
  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width = imgData.img.naturalWidth;
  tmpCanvas.height = imgData.img.naturalHeight;
  const tctx = tmpCanvas.getContext('2d');
  tctx.filter = getFilterCSS();
  tctx.drawImage(imgData.img, 0, 0);
  
  // 새 이미지로 교체
  const newImg = new Image();
  newImg.onload = () => {
    imgData.img = newImg;
    // 필터 초기화
    filterState.brightness = 100;
    filterState.contrast = 100;
    filterState.saturation = 100;
    filterState.blur = 0;
    saveHistory();
    drawCanvas();
    updateToolOptions();
  };
  newImg.src = tmpCanvas.toDataURL('image/png');
};

}
