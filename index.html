window.applyPreset = function(type) {
  if (!images || !images.length) {
    alert('먼저 이미지를 업로드해주세요.');
    return;
  }
  
  if (type === 'auto') {
    // 자동 최적화 - 활성 이미지의 밝기 분석 후 자동 조정
    const result = analyzeImageForAuto();
    filterState.brightness = result.brightness;
    filterState.contrast = result.contrast;
    filterState.saturation = result.saturation;
    filterState.blur = 0;
  } else if (type === 'bright') {
    // 밝게 - 어두운 사진을 환하게
    filterState.brightness = 130;
    filterState.contrast = 110;
    filterState.saturation = 110;
    filterState.blur = 0;
  } else if (type === 'mono') {
    // 모노톤 - 흑백
    filterState.brightness = 105;
    filterState.contrast = 115;
    filterState.saturation = 0;
    filterState.blur = 0;
  } else if (type === 'vivid') {
    // 선명하게 - 채도/대비 강화
    filterState.brightness = 105;
    filterState.contrast = 125;
    filterState.saturation = 140;
    filterState.blur = 0;
  }
  
  syncFilterSliders();
  drawCanvas();
};

// 활성 이미지를 분석해 자동 보정값 계산
function analyzeImageForAuto() {
  const imgData = images[activeImageIndex];
  if (!imgData || !imgData.img) {
    return { brightness: 100, contrast: 100, saturation: 100 };
  }
  
  // 작은 캔버스에 이미지 그려서 픽셀 분석
  const tmpC = document.createElement('canvas');
  const sampleSize = 100;  // 100x100으로 다운샘플
  tmpC.width = sampleSize;
  tmpC.height = sampleSize;
  const tctx = tmpC.getContext('2d');
  tctx.drawImage(imgData.img, 0, 0, sampleSize, sampleSize);
  const data = tctx.getImageData(0, 0, sampleSize, sampleSize).data;
  
  // 평균 밝기 계산
  let totalBrightness = 0;
  let pixels = 0;
  let minB = 255, maxB = 0;
  for (let i = 0; i < data.length; i += 4) {
    const b = (data[i] + data[i+1] + data[i+2]) / 3;
    totalBrightness += b;
    if (b < minB) minB = b;
    if (b > maxB) maxB = b;
    pixels++;
  }
  const avgBrightness = totalBrightness / pixels;  // 0~255
  const range = maxB - minB;  // 명도 범위
  
  // 보정값 결정
  let brightness = 100, contrast = 100, saturation = 110;
  
  // 평균 밝기가 낮으면 (어두운 이미지) 밝게
  if (avgBrightness < 80) {
    brightness = 135;
  } else if (avgBrightness < 110) {
    brightness = 120;
  } else if (avgBrightness < 140) {
    brightness = 110;
  } else if (avgBrightness > 200) {
    brightness = 95;  // 너무 밝으면 살짝 어둡게
  }
  
  // 명도 범위가 좁으면 대비 증가
  if (range < 100) {
    contrast = 130;
  } else if (range < 150) {
    contrast = 115;
  } else if (range < 200) {
    contrast = 108;
  }
  
  return { brightness, contrast, saturation };
}

// 선택된 객체 타입에 맞게 도구 옵션 패널 전환
function switchToolForSelected(tool) {
  currentTool = tool;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`.tool-btn[data-tool="${tool}"]`);
  if (btn) btn.classList.add('active');
  canvas.className = '';
  canvas.classList.add('tool-' + tool);
  if (tool === 'emoji') canvas.classList.add('tool-shape');
  updateToolOptions();
}

// 선택된 객체의 속성을 옵션 패널의 입력 요소에 반영
function syncOptionsFromSelected() {
  const obj = objects.find(o => o.id === selectedObjectId);
  if (!obj) return;
  if (obj.type === 'text') {
    textState.color = obj.color;
    textState.size = obj.size;
    textState.bold = obj.bold;
    textState.bgEnabled = obj.bgEnabled || false;
    textState.bgColor = obj.bgColor || '#ffffff';
    const c = document.getElementById('textColor');
    const s = document.getElementById('textSize');
    const sv = document.getElementById('textSizeVal');
    const b = document.getElementById('textBold');
    const bg = document.getElementById('textBgColor');
    const bge = document.getElementById('textBgEnabled');
    if (c) c.value = obj.color;
    if (s) s.value = obj.size;
    if (sv) sv.textContent = obj.size + 'px';
    if (b) b.checked = obj.bold;
    if (bg) bg.value = textState.bgColor;
    if (bge) bge.checked = textState.bgEnabled;
  } else if (obj.type === 'emoji') {
    emojiState.size = obj.size;
    emojiState.selected = obj.emoji;
    emojiState.color = obj.color || '#000000';
    const s = document.getElementById('emojiSize');
    const sv = document.getElementById('emojiSizeVal');
    const cur = document.getElementById('curEmoji');
    const c = document.getElementById('emojiColor');
    if (s) s.value = obj.size;
    if (sv) sv.textContent = obj.size + 'px';
    if (cur) cur.textContent = obj.emoji;
    if (c) c.value = emojiState.color;
  } else if (obj.type === 'bubble') {
    bubbleState.shape = obj.shape;
    bubbleState.bgColor = obj.bgColor;
    bubbleState.borderColor = obj.borderColor;
    bubbleState.borderWidth = obj.borderWidth;
    bubbleState.textColor = obj.textColor;
    bubbleState.textSize = obj.textSize;
    bubbleState.bold = obj.bold;
    bubbleState.tailDirection = obj.tailDirection;
    document.querySelectorAll('.bubble-shape-btn').forEach(b => b.classList.toggle('active', b.dataset.shape === obj.shape));
    document.querySelectorAll('.tail-btn').forEach(b => b.classList.toggle('active', b.dataset.tail === obj.tailDirection));
    const bg = document.getElementById('bubbleBg');
    const bd = document.getElementById('bubbleBorder');
    const tc = document.getElementById('bubbleTextColor');
    const bw = document.getElementById('bubbleBorderWidth');
    const bwv = document.getElementById('bubbleBorderWidthVal');
    const ts = document.getElementById('bubbleTextSize');
    const tsv = document.getElementById('bubbleTextSizeVal');
    const bb = document.getElementById('bubbleBold');
    if (bg) bg.value = obj.bgColor;
    if (bd) bd.value = obj.borderColor;
    if (tc) tc.value = obj.textColor;
    if (bw) bw.value = obj.borderWidth;
    if (bwv) bwv.textContent = obj.borderWidth + 'px';
    if (ts) ts.value = obj.textSize;
    if (tsv) tsv.textContent = obj.textSize + 'px';
    if (bb) bb.checked = obj.bold;
  }
}

// === 텍스트 인라인 편집 ===
let editingTextObject = null;
let editingPos = { x: 0, y: 0 };

function showTextEditor(canvasX, canvasY, existingObj = null) {
  editingTextObject = existingObj;
  editingPos = { x: canvasX, y: canvasY };
  
  const rect = canvas.getBoundingClientRect();
  const wrapperRect = canvas.parentElement.getBoundingClientRect();
  const scale = rect.width / CANVAS_W;
  
  const screenX = (canvasX * scale) + (rect.left - wrapperRect.left);
  const screenY = (canvasY * scale) + (rect.top - wrapperRect.top);
  
  const size = (existingObj ? existingObj.size : textState.size) * scale;
  const color = existingObj ? existingObj.color : textState.color;
  const bold = existingObj ? existingObj.bold : textState.bold;
  const bgEnabled = existingObj ? existingObj.bgEnabled : textState.bgEnabled;
  const bgColor = existingObj ? (existingObj.bgColor || '#ffffff') : (textState.bgColor === 'transparent' ? '#ffffff' : textState.bgColor);
  
  textOverlay.style.display = 'block';
  textOverlay.style.left = screenX + 'px';
  textOverlay.style.top = screenY + 'px';
  textOverlay.style.fontSize = size + 'px';
  textOverlay.style.color = color;
  textOverlay.style.fontWeight = bold ? 'bold' : 'normal';
  textOverlay.style.background = bgEnabled ? bgColor : 'rgba(255, 255, 255, 0.95)';
  textOverlay.value = existingObj ? existingObj.text : '';
  
  autoResizeTextarea();
  setTimeout(() => {
    textOverlay.focus();
    if (existingObj) textOverlay.select();
  }, 10);
}

function autoResizeTextarea() {
  textOverlay.style.height = 'auto';
  textOverlay.style.width = 'auto';
  const text = textOverlay.value || '내용';
  const lines = text.split('\n');
  let maxLen = 0;
  for (const line of lines) {
    if (line.length > maxLen) maxLen = line.length;
  }
  const fontSize = parseFloat(textOverlay.style.fontSize) || 16;
  // 한글/영문 혼용 시 평균 0.55로 잡고, 약간의 여유만 추가
  const w = Math.max(40, maxLen * fontSize * 0.55 + 8);
  const h = Math.max(fontSize * 1.2, lines.length * fontSize * 1.25 + 4);
  textOverlay.style.width = w + 'px';
  textOverlay.style.height = h + 'px';
}

function commitTextEdit() {
  const text = textOverlay.value.trim();
  
  if (editingTextObject) {
    if (editingTextObject.type === 'bubble') {
      // 말풍선 텍스트 업데이트 (빈 내용도 허용)
      editingTextObject.text = text;
      saveHistory();
    } else if (text === '') {
      // 일반 텍스트, 빈 내용이면 삭제
      objects = objects.filter(o => o.id !== editingTextObject.id);
      saveHistory();
    } else {
      editingTextObject.text = text;
      saveHistory();
    }
  } else {
    if (text !== '') {
      objects.push({
        id: nextObjectId++,
        type: 'text',
        x: editingPos.x,
        y: editingPos.y,
        text: text,
        color: textState.color,
        size: textState.size,
        bold: textState.bold,
        bgEnabled: textState.bgEnabled,
        bgColor: textState.bgColor === 'transparent' ? '#ffffff' : textState.bgColor
      });
      saveHistory();
    }
  }
  
  hideTextEditor();
  updateObjectsList();
  drawCanvas();
}

function hideTextEditor() {
  textOverlay.style.display = 'none';
  textOverlay.value = '';
  editingTextObject = null;
}

textOverlay.addEventListener('input', autoResizeTextarea);
textOverlay.addEventListener('keydown', (e) => {
  // Ctrl/Cmd + Enter 또는 Esc로만 확정/취소
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    commitTextEdit();
  } else if (e.key === 'Escape') {
    e.preventDefault();
    commitTextEdit();
  }
  // 일반 Enter는 줄바꿈으로 사용 (textarea 기본 동작)
});

// 캔버스 더블클릭으로 텍스트 객체 편집
canvas.addEventListener('dblclick', (e) => {
  const pt = getCanvasCoords(e.clientX, e.clientY);
  if (!inImageArea(pt.x, pt.y)) return;
  for (let i = objects.length - 1; i >= 0; i--) {
    const obj = objects[i];
    if (obj.type === 'text' && isPointInObject(pt.x, pt.y, obj)) {
      e.preventDefault();
      e.stopPropagation();
      showTextEditor(obj.x, obj.y, obj);
      return;
    }
    if (obj.type === 'bubble' && isPointInObject(pt.x, pt.y, obj)) {
      e.preventDefault();
      e.stopPropagation();
      showBubbleTextEditor(obj);
      return;
    }
  }
});

// 말풍선 텍스트 편집
function showBubbleTextEditor(bubbleObj) {
  editingTextObject = bubbleObj;
  // 편집 위치는 말풍선 중앙
  const x = Math.min(bubbleObj.x1, bubbleObj.x2);
  const y = Math.min(bubbleObj.y1, bubbleObj.y2);
  const w = Math.abs(bubbleObj.x2 - bubbleObj.x1);
  const h = Math.abs(bubbleObj.y2 - bubbleObj.y1);
  
  editingPos = { x: x + 10, y: y + h / 2 - bubbleObj.textSize / 2 };
  
  const rect = canvas.getBoundingClientRect();
  const wrapperRect = canvas.parentElement.getBoundingClientRect();
  const scale = rect.width / CANVAS_W;
  
  const screenX = (editingPos.x * scale) + (rect.left - wrapperRect.left);
  const screenY = (editingPos.y * scale) + (rect.top - wrapperRect.top);
  
  textOverlay.style.display = 'block';
  textOverlay.style.left = screenX + 'px';
  textOverlay.style.top = screenY + 'px';
  textOverlay.style.fontSize = (bubbleObj.textSize * scale) + 'px';
  textOverlay.style.color = bubbleObj.textColor;
  textOverlay.style.fontWeight = bubbleObj.bold ? 'bold' : 'normal';
  textOverlay.style.background = 'rgba(255, 255, 255, 0.95)';
  textOverlay.style.width = (w * scale - 20) + 'px';
  textOverlay.value = bubbleObj.text || '';
  textOverlay.dataset.bubble = 'true';
  
  setTimeout(() => {
    textOverlay.focus();
    textOverlay.select();
  }, 10);
}

// 캔버스/오버레이/우측패널 외부 클릭 시 텍스트 편집 확정
document.addEventListener('mousedown', (e) => {
  if (textOverlay.style.display === 'none') return;
  // 텍스트 오버레이, 캔버스, 우측 패널의 옵션 영역은 제외 (그 안 클릭은 정상)
  if (textOverlay.contains(e.target)) return;
  if (canvas.contains(e.target)) return; // 캔버스 클릭은 위 핸들러에서 처리
  // 우측 옵션 패널의 슬라이더/색상선택 클릭은 편집 유지 (옵션 변경을 위해)
  const rightPanel = document.querySelector('.panel.right');
  if (rightPanel && rightPanel.contains(e.target)) return;
  // 그 외엔 확정
  commitTextEdit();
}, true);

// === 캔버스 그리기 ===
function drawCanvas() {
  // 흰색 배경
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // 제목 - 입력값 없으면 공란
  const title = titleInput.value;
  if (title) {
    ctx.fillStyle = '#1a1a1a';
    ctx.font = 'bold 30px "Malgun Gothic", "Apple SD Gothic Neo", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(title, CANVAS_W / 2, HEADER_H / 2);
  }

  // 이미지 영역
  if (images.length > 0) {
    drawAllImages();
  } else if (currentImage) {
    drawTransformedImage();
  } else {
    ctx.fillStyle = '#fafafa';
    ctx.fillRect(IMAGE_AREA_X, IMAGE_AREA_Y, IMAGE_AREA_W, IMAGE_AREA_H);
    ctx.strokeStyle = '#ddd';
    ctx.lineWidth = 2;
    ctx.setLineDash([10, 10]);
    ctx.strokeRect(IMAGE_AREA_X, IMAGE_AREA_Y, IMAGE_AREA_W, IMAGE_AREA_H);
    ctx.setLineDash([]);
    ctx.fillStyle = '#bbb';
    ctx.font = '28px "Malgun Gothic", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('좌측 이미지 업로드 기능을 누르거나', CANVAS_W / 2, CANVAS_H / 2 - 20);
    ctx.fillText('이미지를 직접 드롭다운할 수 있습니다', CANVAS_W / 2, CANVAS_H / 2 + 20);
  }

  // 객체 (그리기 패스, 텍스트, 이모티콘, 도형) 그리기
  ctx.save();
  ctx.beginPath();
  ctx.rect(IMAGE_AREA_X, IMAGE_AREA_Y, IMAGE_AREA_W, IMAGE_AREA_H);
  ctx.clip();
  
  for (const obj of objects) {
    drawObject(obj);
  }

  // 진행 중인 그리기 미리보기
  if (drawState.isDrawing && drawState.currentPath) {
    drawObject(drawState.currentPath);
  }
  if (shapeState.isDrawing && shapeState.currentShape) {
    drawObject(shapeState.currentShape);
  }
  if (bubbleDrawing && currentBubble) {
    drawObject(currentBubble);
  }
  if (mosaicState.isDrawing && mosaicState.current) {
    // 그리는 중에는 모자이크 영역 점선만 표시
    const m = mosaicState.current;
    const x = Math.min(m.x1, m.x2), y = Math.min(m.y1, m.y2);
    const w = Math.abs(m.x2 - m.x1), h = Math.abs(m.y2 - m.y1);
    ctx.save();
    ctx.strokeStyle = '#4a90e2';
    ctx.setLineDash([5, 4]);
    ctx.lineWidth = 2;
    if (m.shape === 'circle') {
      ctx.beginPath();
      ctx.ellipse(x + w/2, y + h/2, w/2, h/2, 0, 0, Math.PI * 2);
      ctx.stroke();
    } else {
      ctx.strokeRect(x, y, w, h);
    }
    ctx.restore();
  }

  // 선택된 객체에 핸들 표시
  if (selectedObjectId !== null) {
    const sel = objects.find(o => o.id === selectedObjectId);
    if (sel) drawSelectionIndicator(sel);
  }

  ctx.restore();

  // 캔버스 전체 외곽 테두리 (선택한 색상, 3px)
  ctx.strokeStyle = currentColor;
  ctx.lineWidth = 6; // 캔버스 가장자리에 그리면 절반이 잘리므로 2배
  ctx.setLineDash([]);
  ctx.strokeRect(0, 0, CANVAS_W, CANVAS_H);
}

function drawTransformedImage() {
  const img = currentImage;
  const scale = imgState.baseScale * imgState.zoom;
  const drawW = img.width * scale;
  const drawH = img.height * scale;
  const centerX = IMAGE_AREA_X + IMAGE_AREA_W / 2;
  const centerY = IMAGE_AREA_Y + IMAGE_AREA_H / 2;
  const drawX = centerX - drawW / 2 + imgState.offsetX;
  const drawY = centerY - drawH / 2 + imgState.offsetY;

  ctx.save();
  ctx.beginPath();
  ctx.rect(IMAGE_AREA_X, IMAGE_AREA_Y, IMAGE_AREA_W, IMAGE_AREA_H);
  ctx.clip();
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(IMAGE_AREA_X, IMAGE_AREA_Y, IMAGE_AREA_W, IMAGE_AREA_H);
  ctx.drawImage(img, drawX, drawY, drawW, drawH);
  ctx.restore();
}

// 다중 이미지 + 레이아웃 렌더링
function drawAllImages() {
  // 전체 이미지 영역 흰색 배경
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(IMAGE_AREA_X, IMAGE_AREA_Y, IMAGE_AREA_W, IMAGE_AREA_H);
  
  for (let i = 0; i < images.length; i++) {
    const cell = getCellRect(i);
    if (!cell) continue;
    const item = images[i];
    const img = item.img;
    const st = item.state;
    
    ctx.save();
    ctx.beginPath();
    ctx.rect(cell.x, cell.y, cell.w, cell.h);
    ctx.clip();
    
    // 셀 배경
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(cell.x, cell.y, cell.w, cell.h);
    
    const scale = st.baseScale * st.zoom;
    const drawW = img.width * scale;
    const drawH = img.height * scale;
    const centerX = cell.x + cell.w / 2;
    const centerY = cell.y + cell.h / 2;
    const drawX = centerX - drawW / 2 + st.offsetX;
    const drawY = centerY - drawH / 2 + st.offsetY;
    
    // 필터 도구 활성 시 활성 이미지에 미리보기 필터 적용
    const isActive = (i === activeImageIndex);
    const filterApplied = (currentTool === 'filter' && isActive && 
      (filterState.brightness !== 100 || filterState.contrast !== 100 || 
       filterState.saturation !== 100 || filterState.blur !== 0));
    if (filterApplied) {
      ctx.filter = getFilterCSS();
    }
    ctx.drawImage(img, drawX, drawY, drawW, drawH);
    if (filterApplied) ctx.filter = 'none';
    
    ctx.restore();
    
    // 활성 셀에 표시
    if (i === activeImageIndex && images.length > 1) {
      ctx.save();
      ctx.strokeStyle = '#4a90e2';
      ctx.lineWidth = 3;
      ctx.setLineDash([]);
      ctx.strokeRect(cell.x, cell.y, cell.w, cell.h);
      ctx.restore();
    }
  }
}

// 둥근 사각형 헬퍼 (구버전 호환)
function roundRect(ctx, x, y, w, h, r) {
  if (r > w / 2) r = w / 2;
  if (r > h / 2) r = h / 2;
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawObject(obj) {
  if (obj.type === 'path') {
    ctx.strokeStyle = obj.color;
    ctx.lineWidth = obj.size;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    if (obj.points.length > 0) {
      ctx.moveTo(obj.points[0].x, obj.points[0].y);
      for (let i = 1; i < obj.points.length; i++) {
        ctx.lineTo(obj.points[i].x, obj.points[i].y);
      }
    }
    ctx.stroke();
  } else if (obj.type === 'text') {
    const weight = obj.bold ? 'bold ' : '';
    ctx.font = `${weight}${obj.size}px "Malgun Gothic", "Apple SD Gothic Neo", sans-serif`;
    
    // 배경 그리기
    if (obj.bgEnabled && obj.bgColor && obj.bgColor !== 'transparent') {
      const lines = obj.text.split('\n');
      let maxW = 0;
      for (const line of lines) {
        const w = ctx.measureText(line).width;
        if (w > maxW) maxW = w;
      }
      const h = lines.length * obj.size * 1.2;
      const padX = obj.size * 0.3;
      const padY = obj.size * 0.15;
      ctx.fillStyle = obj.bgColor;
      ctx.beginPath();
      const r = Math.min(8, obj.size * 0.2);
      roundRect(ctx, obj.x - padX, obj.y - padY, maxW + padX * 2, h + padY * 2, r);
      ctx.fill();
    }
    
    ctx.fillStyle = obj.color;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    const lines = obj.text.split('\n');
    lines.forEach((line, i) => {
      ctx.fillText(line, obj.x, obj.y + i * obj.size * 1.2);
    });
  } else if (obj.type === 'emoji') {
    ctx.font = `${obj.size}px "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Malgun Gothic", sans-serif`;
    ctx.fillStyle = obj.color || '#000000';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(obj.emoji, obj.x, obj.y);
  } else if (obj.type === 'shape') {
    ctx.strokeStyle = obj.color;
    ctx.fillStyle = obj.color;
    ctx.lineWidth = obj.size;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    if (obj.shape === 'rect') {
      const x = Math.min(obj.x1, obj.x2), y = Math.min(obj.y1, obj.y2);
      const w = Math.abs(obj.x2 - obj.x1), h = Math.abs(obj.y2 - obj.y1);
      if (obj.fill) ctx.fillRect(x, y, w, h);
      else ctx.strokeRect(x, y, w, h);
    } else if (obj.shape === 'circle') {
      const cx = (obj.x1 + obj.x2) / 2, cy = (obj.y1 + obj.y2) / 2;
      const rx = Math.abs(obj.x2 - obj.x1) / 2, ry = Math.abs(obj.y2 - obj.y1) / 2;
      ctx.beginPath();
      ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
      if (obj.fill) ctx.fill(); else ctx.stroke();
    } else if (obj.shape === 'line') {
      ctx.beginPath();
      ctx.moveTo(obj.x1, obj.y1);
      ctx.lineTo(obj.x2, obj.y2);
      ctx.stroke();
    } else if (obj.shape === 'arrow') {
      ctx.beginPath();
      ctx.moveTo(obj.x1, obj.y1);
      ctx.lineTo(obj.x2, obj.y2);
      ctx.stroke();
      const angle = Math.atan2(obj.y2 - obj.y1, obj.x2 - obj.x1);
      const headLen = 10 + obj.size * 2;
      ctx.beginPath();
      ctx.moveTo(obj.x2, obj.y2);
      ctx.lineTo(obj.x2 - headLen * Math.cos(angle - Math.PI / 6), obj.y2 - headLen * Math.sin(angle - Math.PI / 6));
      ctx.moveTo(obj.x2, obj.y2);
      ctx.lineTo(obj.x2 - headLen * Math.cos(angle + Math.PI / 6), obj.y2 - headLen * Math.sin(angle + Math.PI / 6));
      ctx.stroke();
    }
  } else if (obj.type === 'bubble') {
    drawBubble(obj);
  } else if (obj.type === 'mosaic') {
    drawMosaicObject(obj);
  } else if (obj.type === 'stamp') {
    drawStampObject(obj);
  }
}

// 모자이크 객체 그리기 - 캔버스의 해당 영역 픽셀을 모자이크 처리
function drawMosaicObject(obj) {
  const x1 = Math.min(obj.x1, obj.x2), y1 = Math.min(obj.y1, obj.y2);
  const x2 = Math.max(obj.x1, obj.x2), y2 = Math.max(obj.y1, obj.y2);
  const w = x2 - x1, h = y2 - y1;
  if (w < 5 || h < 5) return;
  
  // 현재 캔버스의 픽셀 가져오기
  let imgData;
  try {
    imgData = ctx.getImageData(x1, y1, w, h);
  } catch (e) {
    return;
  }
  
  // 모자이크 처리
  const block = obj.blockSize || 15;
  applyMosaicToImageData(imgData, block);
  
  // 원형이면 마스크 적용
  if (obj.shape === 'circle') {
    const data = imgData.data;
    const cx = w / 2, cy = h / 2;
    const rx = w / 2, ry = h / 2;
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const dx = (x - cx) / rx, dy = (y - cy) / ry;
        if (dx*dx + dy*dy > 1) {
          data[(y*w + x)*4 + 3] = 0;  // 영역 밖은 투명
        }
      }
    }
  }
  
  // 픽셀 다시 그리기
  ctx.putImageData(imgData, x1, y1);
}

// 도장 객체 그리기
function drawStampObject(obj) {
  if (!obj.img || !obj.img.complete) return;
  const w = obj.size;
  const aspectRatio = obj.img.naturalHeight / obj.img.naturalWidth;
  const h = w * aspectRatio;
  const x = obj.x - w/2;
  const y = obj.y - h/2;
  
  // 도장 색상 적용 - 임시 캔버스에 그려서 색상 변환
  const tmpC = document.createElement('canvas');
  tmpC.width = obj.img.naturalWidth;
  tmpC.height = obj.img.naturalHeight;
  const tctx = tmpC.getContext('2d');
  tctx.drawImage(obj.img, 0, 0);
  // 색상 입히기 (검정 알파 유지하면서 색상만 바꿈)
  tctx.globalCompositeOperation = 'source-in';
  tctx.fillStyle = obj.color || '#1e40af';
  tctx.fillRect(0, 0, tmpC.width, tmpC.height);
  
  ctx.drawImage(tmpC, x, y, w, h);
}

// 말풍선 그리기
function drawBubble(obj) {
  const x = Math.min(obj.x1, obj.x2);
  const y = Math.min(obj.y1, obj.y2);
  const w = Math.abs(obj.x2 - obj.x1);
  const h = Math.abs(obj.y2 - obj.y1);
  
  ctx.save();
  ctx.fillStyle = obj.bgColor;
  ctx.strokeStyle = obj.borderColor;
  ctx.lineWidth = obj.borderWidth;
  ctx.lineJoin = 'round';
  
  ctx.beginPath();
  if (obj.shape === 'round') {
    const r = Math.min(20, w / 4, h / 4);
    bubblePathRound(ctx, x, y, w, h, r, obj.tailDirection);
  } else if (obj.shape === 'rect') {
    bubblePathRect(ctx, x, y, w, h, obj.tailDirection);
  } else if (obj.shape === 'oval') {
    bubblePathOval(ctx, x, y, w, h, obj.tailDirection);
  } else if (obj.shape === 'cloud') {
    bubblePathCloud(ctx, x, y, w, h, obj.tailDirection);
  }
  ctx.fill();
  if (obj.borderWidth > 0) ctx.stroke();
  
  if (obj.text) {
    const weight = obj.bold ? 'bold ' : '';
    ctx.font = `${weight}${obj.textSize}px "Malgun Gothic", "Apple SD Gothic Neo", sans-serif`;
    ctx.fillStyle = obj.textColor;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const lines = obj.text.split('\n');
    const lineH = obj.textSize * 1.2;
    const totalH = lines.length * lineH;
    const startY = y + h / 2 - totalH / 2 + lineH / 2;
    lines.forEach((line, i) => {
      ctx.fillText(line, x + w / 2, startY + i * lineH);
    });
  }
  ctx.restore();
}

function bubblePathRound(ctx, x, y, w, h, r, tail) {
  const tailW = Math.min(20, w * 0.15);
  const tailH = Math.min(20, h * 0.2);
  
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  
  if (tail === 'topRight') {
    ctx.lineTo(x + w, y - tailH);
    ctx.lineTo(x + w - tailW, y + r + 2);
  }
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  
  if (tail === 'bottomRight') {
    ctx.lineTo(x + w - tailW, y + h);
    ctx.lineTo(x + w - tailW * 0.3, y + h + tailH);
    ctx.lineTo(x + w - tailW * 2, y + h);
  }
  ctx.lineTo(x + r, y + h);
  
  if (tail === 'bottomLeft') {
    ctx.lineTo(x + tailW * 2, y + h);
    ctx.lineTo(x + tailW * 0.3, y + h + tailH);
    ctx.lineTo(x + tailW, y + h);
  }
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  
  if (tail === 'topLeft') {
    ctx.lineTo(x + tailW, y + r + 2);
    ctx.lineTo(x, y - tailH);
  }
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function bubblePathRect(ctx, x, y, w, h, tail) {
  const tailW = Math.min(20, w * 0.15);
  const tailH = Math.min(20, h * 0.2);
  
  ctx.moveTo(x, y);
  ctx.lineTo(x + w, y);
  ctx.lineTo(x + w, y + h);
  
  if (tail === 'bottomRight') {
    ctx.lineTo(x + w - tailW, y + h);
    ctx.lineTo(x + w - tailW * 0.3, y + h + tailH);
    ctx.lineTo(x + w - tailW * 2, y + h);
  }
  ctx.lineTo(x, y + h);
  
  if (tail === 'bottomLeft') {
    ctx.lineTo(x + tailW * 2, y + h);
    ctx.lineTo(x + tailW * 0.3, y + h + tailH);
    ctx.lineTo(x + tailW, y + h);
  }
  ctx.lineTo(x, y);
  ctx.closePath();
}

function bubblePathOval(ctx, x, y, w, h, tail) {
  ctx.ellipse(x + w / 2, y + h / 2, w / 2, h / 2, 0, 0, Math.PI * 2);
  if (tail !== 'none') {
    const tailH = Math.min(20, h * 0.25);
    let tx, ty, tx2, ty2, tx3, ty3;
    if (tail === 'bottomLeft') {
      tx = x + w * 0.25; ty = y + h - 2;
      tx2 = x + w * 0.15; ty2 = y + h + tailH;
      tx3 = x + w * 0.4; ty3 = y + h - 2;
    } else if (tail === 'bottomRight') {
      tx = x + w * 0.6; ty = y + h - 2;
      tx2 = x + w * 0.85; ty2 = y + h + tailH;
      tx3 = x + w * 0.75; ty3 = y + h - 2;
    } else if (tail === 'topLeft') {
      tx = x + w * 0.4; ty = y + 2;
      tx2 = x + w * 0.15; ty2 = y - tailH;
      tx3 = x + w * 0.25; ty3 = y + 2;
    } else if (tail === 'topRight') {
      tx = x + w * 0.75; ty = y + 2;
      tx2 = x + w * 0.85; ty2 = y - tailH;
      tx3 = x + w * 0.6; ty3 = y + 2;
    }
    ctx.moveTo(tx, ty);
    ctx.lineTo(tx2, ty2);
    ctx.lineTo(tx3, ty3);
  }
}

function bubblePathCloud(ctx, x, y, w, h, tail) {
  const cx = x + w / 2, cy = y + h / 2;
  const numBumps = 10;
  const r = Math.min(w, h) * 0.18;
  
  ctx.moveTo(cx + (w / 2 - r) * Math.cos(0) + r, cy + (h / 2 - r) * Math.sin(0));
  for (let i = 0; i < numBumps; i++) {
    const angle = (i / numBumps) * Math.PI * 2;
    const bumpX = cx + Math.cos(angle) * (w / 2 - r);
    const bumpY = cy + Math.sin(angle) * (h / 2 - r);
    ctx.arc(bumpX, bumpY, r, angle - Math.PI / 2, angle + Math.PI * 2 / numBumps - Math.PI / 2 + 0.4);
  }
  ctx.closePath();
  
  if (tail !== 'none') {
    let cx2, cy2, cx3, cy3;
    if (tail === 'bottomLeft') {
      cx2 = x + w * 0.2; cy2 = y + h + 8;
      cx3 = x + w * 0.1; cy3 = y + h + 22;
    } else if (tail === 'bottomRight') {
      cx2 = x + w * 0.8; cy2 = y + h + 8;
      cx3 = x + w * 0.9; cy3 = y + h + 22;
    } else if (tail === 'topLeft') {
      cx2 = x + w * 0.2; cy2 = y - 8;
      cx3 = x + w * 0.1; cy3 = y - 22;
    } else {
      cx2 = x + w * 0.8; cy2 = y - 8;
      cx3 = x + w * 0.9; cy3 = y - 22;
    }
    ctx.moveTo(cx2 + 6, cy2); ctx.arc(cx2, cy2, 6, 0, Math.PI * 2);
    ctx.moveTo(cx3 + 4, cy3); ctx.arc(cx3, cy3, 4, 0, Math.PI * 2);
  }
}

// 객체의 경계 박스 계산
function getObjectBounds(obj) {
  if (obj.type === 'path') {
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const p of obj.points) {
      minX = Math.min(minX, p.x);
      minY = Math.min(minY, p.y);
      maxX = Math.max(maxX, p.x);
      maxY = Math.max(maxY, p.y);
    }
    const pad = obj.size / 2;
    return { x: minX - pad, y: minY - pad, w: maxX - minX + pad * 2, h: maxY - minY + pad * 2 };
  } else if (obj.type === 'text') {
    ctx.font = `${obj.bold ? 'bold ' : ''}${obj.size}px "Malgun Gothic", sans-serif`;
    const lines = obj.text.split('\n');
    let maxW = 0;
    for (const line of lines) {
      const w = ctx.measureText(line).width;
      if (w > maxW) maxW = w;
    }
    const h = lines.length * obj.size * 1.2;
    if (obj.bgEnabled) {
      const padX = obj.size * 0.3;
      const padY = obj.size * 0.15;
      return { x: obj.x - padX, y: obj.y - padY, w: maxW + padX * 2, h: h + padY * 2 };
    }
    return { x: obj.x, y: obj.y, w: maxW, h: h };
  } else if (obj.type === 'emoji') {
    return { x: obj.x - obj.size/2, y: obj.y - obj.size/2, w: obj.size, h: obj.size };
  } else if (obj.type === 'shape') {
    const minX = Math.min(obj.x1, obj.x2);
    const minY = Math.min(obj.y1, obj.y2);
    const maxX = Math.max(obj.x1, obj.x2);
    const maxY = Math.max(obj.y1, obj.y2);
    const pad = obj.size;
    return { x: minX - pad, y: minY - pad, w: maxX - minX + pad * 2, h: maxY - minY + pad * 2 };
  } else if (obj.type === 'bubble') {
    const minX = Math.min(obj.x1, obj.x2);
    const minY = Math.min(obj.y1, obj.y2);
    const maxX = Math.max(obj.x1, obj.x2);
    const maxY = Math.max(obj.y1, obj.y2);
    // 꼬리 영역 포함
    const tailExt = 30;
    return { x: minX, y: minY, w: maxX - minX, h: maxY - minY + (obj.tailDirection && obj.tailDirection.startsWith('bottom') ? tailExt : 0) };
  } else if (obj.type === 'mosaic') {
    const minX = Math.min(obj.x1, obj.x2);
    const minY = Math.min(obj.y1, obj.y2);
    const maxX = Math.max(obj.x1, obj.x2);
    const maxY = Math.max(obj.y1, obj.y2);
    return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
  } else if (obj.type === 'stamp') {
    const w = obj.size;
    const aspectRatio = (obj.img && obj.img.naturalWidth) ? obj.img.naturalHeight / obj.img.naturalWidth : 1;
    const h = w * aspectRatio;
    return { x: obj.x - w/2, y: obj.y - h/2, w: w, h: h };
  }
  return { x: 0, y: 0, w: 0, h: 0 };
}

// 좌표가 객체 위에 있는지 확인
function isPointInObject(x, y, obj) {
  const b = getObjectBounds(obj);
  return x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h;
}

// 좌표에서 가장 위에 있는 객체 찾기 (역순으로 검색 - 나중에 그린 것이 위에 있음)
function findObjectAt(x, y) {
  for (let i = objects.length - 1; i >= 0; i--) {
    if (isPointInObject(x, y, objects[i])) {
      return objects[i];
    }
  }
  return null;
}

// 객체 이동
function moveObject(obj, dx, dy) {
  if (obj.type === 'path') {
    for (const p of obj.points) {
      p.x += dx;
      p.y += dy;
    }
  } else if (obj.type === 'text' || obj.type === 'emoji' || obj.type === 'stamp') {
    obj.x += dx;
    obj.y += dy;
  } else if (obj.type === 'shape' || obj.type === 'bubble' || obj.type === 'mosaic') {
    obj.x1 += dx;
    obj.y1 += dy;
    obj.x2 += dx;
    obj.y2 += dy;
  }
}

// 객체 리사이즈 (모서리 핸들 드래그)
function resizeObject(obj, handle, dx, dy) {
  const startB = resizeStartBounds;
  
  // 핸들에 따른 새 너비/높이 계산
  let newW, newH;
  if (handle === 'br') {
    newW = startB.w + dx;
    newH = startB.h + dy;
  } else if (handle === 'tr') {
    newW = startB.w + dx;
    newH = startB.h - dy;
  } else if (handle === 'bl') {
    newW = startB.w - dx;
    newH = startB.h + dy;
  } else if (handle === 'tl') {
    newW = startB.w - dx;
    newH = startB.h - dy;
  }
  
  if (newW < 10) newW = 10;
  if (newH < 10) newH = 10;
  
  if (obj.type === 'text' || obj.type === 'emoji') {
    // 텍스트/이모티콘은 비율 유지하며 사이즈 조정
    const scaleW = newW / startB.w;
    const scaleH = newH / startB.h;
    const scale = Math.max(scaleW, scaleH); // 큰 쪽 기준 (또는 평균)
    obj.size = Math.max(8, Math.round(startB.size * scale));
  } else if (obj.type === 'stamp') {
    // 도장은 비율 유지
    const scaleW = newW / startB.w;
    obj.size = Math.max(20, Math.round(startB.size * scaleW));
  } else if (obj.type === 'shape' || obj.type === 'bubble' || obj.type === 'mosaic') {
    // 도형/말풍선은 모서리 좌표 직접 변경
    let x1 = startB.x1, y1 = startB.y1, x2 = startB.x2, y2 = startB.y2;
    // 시작 좌표(작은쪽)와 끝 좌표(큰쪽) 정리
    const left = Math.min(x1, x2), right = Math.max(x1, x2);
    const top = Math.min(y1, y2), bottom = Math.max(y1, y2);
    
    let newLeft = left, newRight = right, newTop = top, newBottom = bottom;
    if (handle === 'br') { newRight = left + newW; newBottom = top + newH; }
    else if (handle === 'tr') { newRight = left + newW; newTop = bottom - newH; }
    else if (handle === 'bl') { newLeft = right - newW; newBottom = top + newH; }
    else if (handle === 'tl') { newLeft = right - newW; newTop = bottom - newH; }
    
    // 원래 x1,y1이 left,top인지 right,bottom인지 유지
    if (x1 <= x2) { obj.x1 = newLeft; obj.x2 = newRight; }
    else { obj.x1 = newRight; obj.x2 = newLeft; }
    if (y1 <= y2) { obj.y1 = newTop; obj.y2 = newBottom; }
    else { obj.y1 = newBottom; obj.y2 = newTop; }
  } else if (obj.type === 'path') {
    // 패스는 비례 스케일링
    const scaleW = newW / startB.w;
    const scaleH = newH / startB.h;
    // 보관된 시작점 기준이 없으므로 현재 객체에서 다시 계산은 어려움 - skip
  }
  
  // 옵션 패널 동기화
  syncOptionsFromSelected();
}

// 선택된 객체에 점선 박스와 핸들 그리기
function drawSelectionIndicator(obj) {
  const b = getObjectBounds(obj);
  ctx.save();
  ctx.strokeStyle = '#4a90e2';
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 4]);
  ctx.strokeRect(b.x - 4, b.y - 4, b.w + 8, b.h + 8);
  ctx.setLineDash([]);
  // 모서리 핸들
  const handleSize = 12;
  const corners = getResizeHandles(obj);
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#4a90e2';
  ctx.lineWidth = 2;
  for (const c of corners) {
    ctx.beginPath();
    ctx.rect(c.x - handleSize/2, c.y - handleSize/2, handleSize, handleSize);
    ctx.fill();
    ctx.stroke();
  }
  ctx.restore();
}

// 리사이즈 핸들의 좌표 (4개 모서리)
function getResizeHandles(obj) {
  const b = getObjectBounds(obj);
  return [
    { x: b.x - 4, y: b.y - 4, type: 'tl' },           // top-left
    { x: b.x + b.w + 4, y: b.y - 4, type: 'tr' },     // top-right
    { x: b.x - 4, y: b.y + b.h + 4, type: 'bl' },     // bottom-left
    { x: b.x + b.w + 4, y: b.y + b.h + 4, type: 'br' } // bottom-right
  ];
}

// 좌표가 어떤 핸들 위에 있는지 확인
function findHandleAt(x, y, obj) {
  if (!obj) return null;
  const handles = getResizeHandles(obj);
  const hs = 12;
  for (const h of handles) {
    if (Math.abs(x - h.x) <= hs && Math.abs(y - h.y) <= hs) {
      return h.type;
    }
  }
  return null;
}

// === 객체 리스트 업데이트 ===
function updateObjectsList() {
  if (objects.length === 0) {
    objectsList.innerHTML = '<div style="text-align:center; color:#aaa; padding:10px; font-size:11px;">추가된 객체가 없습니다</div>';
    return;
  }
  objectsList.innerHTML = objects.map(obj => {
    let icon = '📌', text = '';
    if (obj.type === 'path') { icon = '✏️'; text = `그리기 (${obj.points.length}점)`; }
    else if (obj.type === 'text') { icon = '📝'; text = obj.text.substring(0, 15); }
    else if (obj.type === 'emoji') { icon = obj.emoji; text = '이모티콘'; }
    else if (obj.type === 'shape') {
      const names = {rect:'사각형', circle:'원', line:'선', arrow:'화살표'};
      icon = '⬜'; text = names[obj.shape] || '도형';
    }
    else if (obj.type === 'bubble') {
      icon = '💬'; text = obj.text ? obj.text.substring(0, 15) : '말풍선';
    }
    else if (obj.type === 'mosaic') {
      icon = '🟫'; text = obj.shape === 'circle' ? '모자이크(원)' : '모자이크';
    }
    else if (obj.type === 'stamp') {
      icon = '🏷️'; text = '로고';
    }
    const selected = obj.id === selectedObjectId ? 'selected' : '';
    return `<div class="object-item ${selected}" data-id="${obj.id}" onclick="selectObjectFromList(${obj.id})">
      <span class="obj-icon">${icon}</span>
      <span class="obj-text">${text}</span>
      <button class="obj-delete" onclick="event.stopPropagation();deleteObject(${obj.id})">×</button>
    </div>`;
  }).join('');
}

window.deleteObject = function(id) {
  objects = objects.filter(o => o.id !== id);
  if (selectedObjectId === id) selectedObjectId = null;
  saveHistory();
  updateObjectsList();
  drawCanvas();
};

// 객체 리스트 클릭 시 선택
window.selectObjectFromList = function(id) {
  selectedObjectId = id;
  const obj = objects.find(o => o.id === id);
  if (obj) {
    if (obj.type === 'text' && currentTool !== 'text') {
      switchToolForSelected('text');
    } else if (obj.type === 'emoji' && currentTool !== 'emoji') {
      switchToolForSelected('emoji');
    } else if (obj.type === 'bubble' && currentTool !== 'bubble') {
      switchToolForSelected('bubble');
    }
    syncOptionsFromSelected();
  }
  drawCanvas();
};

// === 좌표 변환 ===
function getCanvasCoords(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = CANVAS_W / rect.width;
  const scaleY = CANVAS_H / rect.height;
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top) * scaleY
  };
}

function inImageArea(x, y) {
  return x >= IMAGE_AREA_X && x <= IMAGE_AREA_X + IMAGE_AREA_W &&
         y >= IMAGE_AREA_Y && y <= IMAGE_AREA_Y + IMAGE_AREA_H;
}

// === 마우스/터치 이벤트 ===
let isDragging = false;
let dragStart = { x: 0, y: 0 };
let dragStartOffset = { x: 0, y: 0 };

// 객체 이동 상태
let movingObject = null;
let moveStartPt = null;

// 객체 리사이즈 상태
let resizingObject = null;
let resizeHandle = null;
let resizeStartBounds = null;
let resizeStartPt = null;

// 말풍선 그리기 상태
let bubbleDrawing = false;
let bubbleStart = null;
let currentBubble = null;

canvas.addEventListener('mousedown', (e) => {
  // 텍스트 편집 중이면 빈 곳 클릭으로 확정 (textarea 자체 클릭은 무시)
  if (textOverlay.style.display !== 'none') {
    commitTextEdit();
    return;
  }
  
  const pt = getCanvasCoords(e.clientX, e.clientY);
  if (!inImageArea(pt.x, pt.y)) return;
  e.preventDefault();

  // 0) 선택된 객체가 있으면 핸들 클릭 검사 (가장 우선)
  if (selectedObjectId !== null) {
    const sel = objects.find(o => o.id === selectedObjectId);
    if (sel) {
      const handle = findHandleAt(pt.x, pt.y, sel);
      if (handle) {
        // 리사이즈 시작
        resizingObject = sel;
        resizeHandle = handle;
        resizeStartPt = { x: pt.x, y: pt.y };
        resizeStartBounds = getObjectBounds(sel);
        // 객체별 시작 데이터 저장
        if (sel.type === 'text') {
          resizeStartBounds.size = sel.size;
        } else if (sel.type === 'emoji') {
          resizeStartBounds.size = sel.size;
        } else if (sel.type === 'stamp') {
          resizeStartBounds.size = sel.size;
        } else if (sel.type === 'shape' || sel.type === 'bubble' || sel.type === 'mosaic') {
          resizeStartBounds.x1 = sel.x1;
          resizeStartBounds.y1 = sel.y1;
          resizeStartBounds.x2 = sel.x2;
          resizeStartBounds.y2 = sel.y2;
        }
        return;
      }
    }
  }

  // 1) 먼저 클릭한 위치에 객체가 있는지 확인 (이동/선택 우선)
  // 단, 그리기/도형/지우개/말풍선/모자이크 도구는 자유롭게 그릴 수 있어야 하므로 객체 검사 스킵
  if (currentTool !== 'draw' && currentTool !== 'shape' && currentTool !== 'erase' && currentTool !== 'bubble' && currentTool !== 'mosaic') {
    const hit = findObjectAt(pt.x, pt.y);
    if (hit) {
      selectedObjectId = hit.id;
      movingObject = hit;
      moveStartPt = { x: pt.x, y: pt.y };
      canvas.classList.add('moving-object');
      // 선택된 객체 타입에 맞춰 도구 옵션 자동 전환 (편집 편의성)
      if (hit.type === 'text' && currentTool !== 'text') {
        switchToolForSelected('text');
      } else if (hit.type === 'emoji' && currentTool !== 'emoji') {
        switchToolForSelected('emoji');
      } else if (hit.type === 'bubble' && currentTool !== 'bubble') {
        switchToolForSelected('bubble');
      } else if (hit.type === 'shape' && currentTool !== 'shape') {
        // shape 도구는 그리기 모드라 전환 X (옵션만 동기화)
      }
      // 선택된 객체의 속성을 옵션 패널에 반영
      syncOptionsFromSelected();
      drawCanvas();
      return;
    } else {
      // 빈 곳 클릭 시 선택 해제
      if (selectedObjectId !== null) {
        selectedObjectId = null;
        drawCanvas();
      }
    }
  }

  // 2) 도구별 기본 동작
  if (currentTool === 'image') {
    if (images.length === 0 && !currentImage) return;
    // 다중 이미지일 경우, 클릭한 위치의 셀을 활성화
    if (images.length > 0) {
      for (let i = 0; i < images.length; i++) {
        const cell = getCellRect(i);
        if (pt.x >= cell.x && pt.x <= cell.x + cell.w && pt.y >= cell.y && pt.y <= cell.y + cell.h) {
          activeImageIndex = i;
          syncSlidersFromActiveImage();
          updateImageThumbs();
          break;
        }
      }
    }
    isDragging = true;
    canvas.classList.add('dragging');
    dragStart.x = e.clientX;
    dragStart.y = e.clientY;
    const st = getActiveImageState();
    dragStartOffset.x = st.offsetX;
    dragStartOffset.y = st.offsetY;
    drawCanvas();
  } else if (currentTool === 'draw') {
    drawState.isDrawing = true;
    drawState.currentPath = {
      id: nextObjectId++,
      type: 'path',
      color: drawState.color,
      size: drawState.size,
      points: [{x: pt.x, y: pt.y}]
    };
  } else if (currentTool === 'erase') {
    eraseAt(pt.x, pt.y);
  } else if (currentTool === 'text') {
    // 인라인 텍스트 에디터 표시
    showTextEditor(pt.x, pt.y, null);
  } else if (currentTool === 'emoji') {
    objects.push({
      id: nextObjectId++,
      type: 'emoji',
      x: pt.x, y: pt.y,
      emoji: emojiState.selected,
      size: emojiState.size,
      color: emojiState.color
    });
    saveHistory();
    updateObjectsList();
    drawCanvas();
  } else if (currentTool === 'shape') {
    shapeState.isDrawing = true;
    shapeState.startX = pt.x;
    shapeState.startY = pt.y;
    shapeState.currentShape = {
      id: nextObjectId++,
      type: 'shape',
      shape: shapeState.type,
      x1: pt.x, y1: pt.y,
      x2: pt.x, y2: pt.y,
      color: shapeState.color,
      size: shapeState.size,
      fill: shapeState.fill
    };
  } else if (currentTool === 'bubble') {
    bubbleDrawing = true;
    bubbleStart = { x: pt.x, y: pt.y };
    currentBubble = {
      id: nextObjectId++,
      type: 'bubble',
      shape: bubbleState.shape,
      x1: pt.x, y1: pt.y,
      x2: pt.x, y2: pt.y,
      bgColor: bubbleState.bgColor,
      borderColor: bubbleState.borderColor,
      borderWidth: bubbleState.borderWidth,
      textColor: bubbleState.textColor,
      textSize: bubbleState.textSize,
      bold: bubbleState.bold,
      tailDirection: bubbleState.tailDirection,
      text: ''
    };
  } else if (currentTool === 'mosaic') {
    mosaicState.isDrawing = true;
    mosaicState.startX = pt.x;
    mosaicState.startY = pt.y;
    mosaicState.current = {
      id: nextObjectId++,
      type: 'mosaic',
      shape: mosaicState.shape,
      x1: pt.x, y1: pt.y,
      x2: pt.x, y2: pt.y,
      blockSize: mosaicState.blockSize
    };
  } else if (currentTool === 'stamp') {
    if (stampState.customStamps.length === 0) {
      alert('먼저 로고 이미지를 업로드해주세요.');
      return;
    }
    const s = stampState.customStamps[stampState.selected];
    if (!s) return;
    objects.push({
      id: nextObjectId++,
      type: 'stamp',
      x: pt.x, y: pt.y,
      size: stampState.size,
      color: stampState.color,
      img: s.img,
      stampIdx: stampState.selected,
      dataUrl: s.dataUrl
    });
    saveHistory();
    updateObjectsList();
    drawCanvas();
  }
});

window.addEventListener('mousemove', (e) => {
  // 리사이즈 중
  if (resizingObject) {
    const pt = getCanvasCoords(e.clientX, e.clientY);
    const dx = pt.x - resizeStartPt.x;
    const dy = pt.y - resizeStartPt.y;
    resizeObject(resizingObject, resizeHandle, dx, dy);
    drawCanvas();
    return;
  }
  
  // 객체 이동 중
  if (movingObject) {
    const pt = getCanvasCoords(e.clientX, e.clientY);
    const dx = pt.x - moveStartPt.x;
    const dy = pt.y - moveStartPt.y;
    moveObject(movingObject, dx, dy);
    moveStartPt = { x: pt.x, y: pt.y };
    drawCanvas();
    return;
  }

  if (currentTool === 'image' && isDragging) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = CANVAS_W / rect.width;
    const dx = (e.clientX - dragStart.x) * scaleX;
    const dy = (e.clientY - dragStart.y) * scaleX;
    const st = getActiveImageState();
    st.offsetX = dragStartOffset.x + dx;
    st.offsetY = dragStartOffset.y + dy;
    syncSlidersFromActiveImage();
    drawCanvas();
  } else if (currentTool === 'draw' && drawState.isDrawing) {
    const pt = getCanvasCoords(e.clientX, e.clientY);
    drawState.currentPath.points.push({x: pt.x, y: pt.y});
    drawCanvas();
  } else if (currentTool === 'erase' && e.buttons === 1) {
    const pt = getCanvasCoords(e.clientX, e.clientY);
    if (inImageArea(pt.x, pt.y)) eraseAt(pt.x, pt.y);
  } else if (currentTool === 'shape' && shapeState.isDrawing) {
    const pt = getCanvasCoords(e.clientX, e.clientY);
    shapeState.currentShape.x2 = pt.x;
    shapeState.currentShape.y2 = pt.y;
    drawCanvas();
  } else if (currentTool === 'bubble' && bubbleDrawing) {
    const pt = getCanvasCoords(e.clientX, e.clientY);
    currentBubble.x2 = pt.x;
    currentBubble.y2 = pt.y;
    drawCanvas();
  } else if (currentTool === 'mosaic' && mosaicState.isDrawing) {
    const pt = getCanvasCoords(e.clientX, e.clientY);
    mosaicState.current.x2 = pt.x;
    mosaicState.current.y2 = pt.y;
    drawCanvas();
  }
});

// 캔버스 호버 시 객체 위에 있으면 이동 커서 표시
canvas.addEventListener('mousemove', (e) => {
  if (movingObject || isDragging || drawState.isDrawing || shapeState.isDrawing || resizingObject) return;
  if (currentTool === 'draw' || currentTool === 'shape' || currentTool === 'erase') {
    canvas.classList.remove('over-object', 'over-handle-tl', 'over-handle-tr', 'over-handle-bl', 'over-handle-br');
    return;
  }
  const pt = getCanvasCoords(e.clientX, e.clientY);
  
  // 핸들 위 호버
  canvas.classList.remove('over-handle-tl', 'over-handle-tr', 'over-handle-bl', 'over-handle-br');
  if (selectedObjectId !== null) {
    const sel = objects.find(o => o.id === selectedObjectId);
    if (sel) {
      const handle = findHandleAt(pt.x, pt.y, sel);
      if (handle) {
        canvas.classList.add('over-handle-' + handle);
        canvas.classList.remove('over-object');
        return;
      }
    }
  }
  
  if (inImageArea(pt.x, pt.y) && findObjectAt(pt.x, pt.y)) {
    canvas.classList.add('over-object');
  } else {
    canvas.classList.remove('over-object');
  }
});

window.addEventListener('mouseup', () => {
  // 리사이즈 종료
  if (resizingObject) {
    resizingObject = null;
    resizeHandle = null;
    resizeStartBounds = null;
    resizeStartPt = null;
    saveHistory();
    drawCanvas();
    return;
  }
  // 객체 이동 종료
  if (movingObject) {
    movingObject = null;
    moveStartPt = null;
    canvas.classList.remove('moving-object');
    saveHistory();
    drawCanvas();
    return;
  }
  if (isDragging) {
    isDragging = false;
    canvas.classList.remove('dragging');
  }
  if (drawState.isDrawing) {
    if (drawState.currentPath && drawState.currentPath.points.length > 1) {
      objects.push(drawState.currentPath);
      saveHistory();
      updateObjectsList();
    }
    drawState.isDrawing = false;
    drawState.currentPath = null;
    drawCanvas();
  }
  if (shapeState.isDrawing) {
    if (shapeState.currentShape) {
      const s = shapeState.currentShape;
      if (Math.abs(s.x2 - s.x1) > 3 || Math.abs(s.y2 - s.y1) > 3) {
        objects.push(s);
        saveHistory();
        updateObjectsList();
      }
    }
    shapeState.isDrawing = false;
    shapeState.currentShape = null;
    drawCanvas();
  }
  if (bubbleDrawing) {
    if (currentBubble) {
      const b = currentBubble;
      if (Math.abs(b.x2 - b.x1) > 20 && Math.abs(b.y2 - b.y1) > 20) {
        objects.push(b);
        saveHistory();
        updateObjectsList();
      }
    }
    bubbleDrawing = false;
    currentBubble = null;
    drawCanvas();
  }
  if (mosaicState.isDrawing) {
    if (mosaicState.current) {
      const m = mosaicState.current;
      if (Math.abs(m.x2 - m.x1) > 10 && Math.abs(m.y2 - m.y1) > 10) {
        objects.push(m);
        saveHistory();
        updateObjectsList();
      }
    }
    mosaicState.isDrawing = false;
    mosaicState.current = null;
    drawCanvas();
  }
});

// 지우개 - 객체 삭제
function eraseAt(x, y) {
  const r = eraseState.size / 2;
  let changed = false;
  objects = objects.filter(obj => {
    if (obj.type === 'text') {
      // 텍스트 박스 영역
      const w = obj.text.length * obj.size * 0.6;
      const h = obj.size;
      if (x >= obj.x - r && x <= obj.x + w + r && y >= obj.y - r && y <= obj.y + h + r) {
        changed = true;
        return false;
      }
    } else if (obj.type === 'emoji') {
      const dx = x - obj.x, dy = y - obj.y;
      if (Math.sqrt(dx*dx + dy*dy) < obj.size/2 + r) {
        changed = true;
        return false;
      }
    } else if (obj.type === 'shape') {
      // 도형 박스 영역 충돌 검사
      const minX = Math.min(obj.x1, obj.x2) - r;
      const maxX = Math.max(obj.x1, obj.x2) + r;
      const minY = Math.min(obj.y1, obj.y2) - r;
      const maxY = Math.max(obj.y1, obj.y2) + r;
      if (x >= minX && x <= maxX && y >= minY && y <= maxY) {
        changed = true;
        return false;
      }
    } else if (obj.type === 'path') {
      // 경로의 어떤 점과 가까우면 삭제
      for (const p of obj.points) {
        const dx = x - p.x, dy = y - p.y;
        if (Math.sqrt(dx*dx + dy*dy) < r + obj.size/2) {
          changed = true;
          return false;
        }
      }
    }
    return true;
  });
  if (changed) {
    saveHistory();
    updateObjectsList();
    drawCanvas();
  }
}

// 마우스 휠 (이미지 모드일 때만)
canvas.addEventListener('wheel', (e) => {
  if (currentTool !== 'image' || images.length === 0) return;
  e.preventDefault();
  // 마우스 위치의 셀 활성화
  const pt = getCanvasCoords(e.clientX, e.clientY);
  for (let i = 0; i < images.length; i++) {
    const cell = getCellRect(i);
    if (pt.x >= cell.x && pt.x <= cell.x + cell.w && pt.y >= cell.y && pt.y <= cell.y + cell.h) {
      activeImageIndex = i;
      updateImageThumbs();
      break;
    }
  }
  const delta = e.deltaY > 0 ? -0.05 : 0.05;
  const st = getActiveImageState();
  let newZoom = st.zoom + delta;
  newZoom = Math.max(0.1, Math.min(5.0, newZoom));
  st.zoom = newZoom;
  syncSlidersFromActiveImage();
  drawCanvas();
}, { passive: false });

// === 터치 ===
let touchStart = null;
let touchStartOffset = null;
let lastTouchDistance = null;

canvas.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    const t = e.touches[0];
    const fakeEvent = { clientX: t.clientX, clientY: t.clientY, preventDefault: () => {}, buttons: 1 };
    canvas.dispatchEvent(new MouseEvent('mousedown', { clientX: t.clientX, clientY: t.clientY, bubbles: false }));
  } else if (e.touches.length === 2 && currentTool === 'image' && (currentImage || images.length > 0)) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastTouchDistance = Math.sqrt(dx * dx + dy * dy);
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  if (e.touches.length === 1) {
    const t = e.touches[0];
    window.dispatchEvent(new MouseEvent('mousemove', { clientX: t.clientX, clientY: t.clientY, buttons: 1 }));
  } else if (e.touches.length === 2 && currentTool === 'image' && lastTouchDistance) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const ratio = dist / lastTouchDistance;
    const st = getActiveImageState();
    let newZoom = st.zoom * ratio;
    newZoom = Math.max(0.1, Math.min(5.0, newZoom));
    st.zoom = newZoom;
    lastTouchDistance = dist;
    syncSlidersFromActiveImage();
    drawCanvas();
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', () => {
  window.dispatchEvent(new MouseEvent('mouseup'));
  lastTouchDistance = null;
});

// === 메시지 템플릿 ===

// === 저장/복사 ===
function downloadImage() {
  const title = titleInput.value.trim() || '상담이미지';
  const link = document.createElement('a');
  link.download = `${title}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('✓ PNG 파일이 저장되었습니다', 'success');
}

async function copyImage() {
  try {
    canvas.toBlob(async (blob) => {
      try {
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        showToast('✓ 이미지가 클립보드에 복사되었습니다!', 'success');
      } catch (err) {
        showToast('✗ 복사 실패: 브라우저가 지원하지 않습니다', 'error');
      }
    }, 'image/png');
  } catch (err) {
    showToast('✗ 복사 중 오류가 발생했습니다', 'error');
  }
}

async function copyMessage() {
  const text = messageInput.value;
  if (!text.trim()) {
    showToast('✗ 복사할 메시지가 없습니다', 'error');
    return;
  }
  try {
    await navigator.clipboard.writeText(text);
    showToast('✓ 메시지가 클립보드에 복사되었습니다!', 'success');
  } catch (err) {
    // fallback
    messageInput.select();
    document.execCommand('copy');
    showToast('✓ 메시지가 복사되었습니다', 'success');
  }
}
window.copyMessage = copyMessage;

function showToast(message, type = '') {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = 'toast show ' + type;
  setTimeout(() => { toast.className = 'toast ' + type; }, 2500);
}

// 캔버스 wrapper와 사이드바를 화면에 맞게 조정
// 핵심: PNG 저장/이미지 복사 버튼이 항상 화면에 보이도록 캔버스 영역 제한
function syncCanvasLayout() {
  const area = document.querySelector('.canvas-area');
  const wrapper = document.querySelector('.canvas-wrapper');
  const sideBar = document.querySelector('.canvas-side-bar');
  const actionButtons = document.querySelector('.panel.center .action-buttons');
  const previewHeader = document.querySelector('.panel.center .preview-header, .panel.center .preview-label');
  const footer = document.querySelector('.app-footer');
  const h1 = document.querySelector('h1');
  if (!area || !wrapper || !sideBar) return;
  
  // 강제 크기 풀어 자연 area 측정
  wrapper.style.width = '';
  wrapper.style.height = '';
  sideBar.style.height = '';
  sideBar.style.maxHeight = '';
  area.style.maxHeight = '';
  if (actionButtons) {
    actionButtons.style.width = '';
  }
  
  // 화면 전체 높이에서 잘리면 안되는 요소들 빼서 캔버스 영역 최대 높이 계산
  const viewportH = window.innerHeight;
  const h1H = h1 ? h1.offsetHeight : 40;
  const previewH = previewHeader ? previewHeader.offsetHeight : 24;
  const actionH = actionButtons ? actionButtons.offsetHeight : 50;
  const footerH = footer ? footer.offsetHeight : 60;
  const topLineH = 8;
  const safetyMargin = 40;
  
  // 캔버스가 사용할 수 있는 최대 안전 높이
  const maxSafeH = viewportH - h1H - previewH - actionH - footerH - topLineH - safetyMargin;
  
  // 가로 사용 가능 폭
  const areaRect = area.getBoundingClientRect();
  const sideBarWidth = 100;  // CSS와 일치 (인덱스 형식 폭)
  const gap = 5;
  const availW = areaRect.width - sideBarWidth - gap;
  
  // 가로 폭이 너무 작으면 (초기 렌더링 시) 적용 안 함
  if (availW < 100) return;
  
  // 캔버스 비율 1088:889
  const canvasRatio = 1088 / 889;
  
  // ★ 핵심: 캔버스 영역은 무조건 화면 안전 높이를 넘지 못하도록 제한
  const availH = Math.min(Math.max(200, areaRect.height), maxSafeH);
  
  // 비율 fit 계산
  let displayW, displayH;
  if (availW / availH > canvasRatio) {
    displayH = Math.floor(availH);
    displayW = Math.floor(displayH * canvasRatio);
  } else {
    displayW = Math.floor(availW);
    displayH = Math.floor(displayW / canvasRatio);
  }
  
  // 안전 검증
  if (displayW < 100 || displayH < 100) return;
  
  // wrapper 크기 강제
  wrapper.style.width = displayW + 'px';
  wrapper.style.height = displayH + 'px';
  wrapper.style.flex = 'none';
  
  // canvas-area 자체도 max-height로 제한 (다른 요소들이 밀어내지 못하도록)
  area.style.maxHeight = displayH + 'px';
  
  // 사이드바 높이를 캔버스와 정확히 일치
  sideBar.style.height = displayH + 'px';
  sideBar.style.maxHeight = displayH + 'px';
  
  // PNG 저장/이미지 복사 버튼 폭 = 캔버스 wrapper + gap + 사이드바
  if (actionButtons) {
    const totalW = displayW + gap + sideBarWidth;
    actionButtons.style.width = totalW + 'px';
    actionButtons.style.alignSelf = 'flex-start';
  }
}

// 초기화
updateToolOptions();
saveHistory();
drawCanvas();
syncCanvasLayout();

// 리사이즈 시 재계산
window.addEventListener('resize', syncCanvasLayout);
window.addEventListener('load', syncCanvasLayout);
setTimeout(syncCanvasLayout, 100);
setTimeout(syncCanvasLayout, 500);
setTimeout(syncCanvasLayout, 1000);
</script>
</body>
